<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Featured posts · KIMCHI MART Admin</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.wrap{max-width:680px;margin:0 auto;padding:16px 14px 60px}
.gate{max-width:340px;margin:60px auto;text-align:center}
.gate input{width:100%;padding:13px;border:1px solid var(--border);border-radius:var(--radius);font-size:1.4em;text-align:center;letter-spacing:.3em;font-family:inherit}
.btn{background:var(--km-green);color:#fff;border:0;border-radius:var(--radius);padding:12px 16px;font-family:inherit;font-weight:800;cursor:pointer}
.btn.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.in{width:100%;padding:11px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:.95em;margin-top:8px}
.alert.error{background:#fee2e2;color:#991b1b;padding:10px;border-radius:var(--radius);margin-top:10px;font-weight:700}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:10px;display:flex;gap:10px;align-items:center}
.card img{width:54px;height:54px;border-radius:8px;object-fit:cover;background:#eee}
.card .b{flex:1;min-width:0}
.card .cap{font-weight:700;font-size:.9em}
.card a{font-size:.8em;color:#1d4ed8;word-break:break-all}
</style>
</head>
<body>
<div class="wrap">
  <div id="gate" class="gate">
    <img src="./pwa-assets/icon-192.png" style="width:54px;border-radius:12px;margin-bottom:14px" alt="">
    <h2 style="font-weight:900">📷 Featured posts</h2>
    <p style="color:var(--text-3);font-size:.88em;margin:6px 0 16px">Staff only · admin PIN</p>
    <input id="adminPin" type="password" inputmode="numeric" placeholder="••••" maxlength="8">
    <div style="margin-top:12px"><button class="btn" id="btnAdmin" style="width:100%">Enter</button></div>
    <div id="gateAlert"></div>
  </div>

  <div id="main" style="display:none">
    <h2 style="font-weight:900">📷 Featured Instagram posts</h2>
    <p style="color:var(--text-2);font-size:.88em;margin:4px 0 14px">Add the best posts to show in the app's Discover tab. Paste the post link; image &amp; caption optional.</p>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px">
      <input class="in" id="fLink" type="url" placeholder="Instagram post link (https://instagram.com/p/...)">
      <input class="in" id="fImg" type="url" placeholder="Image URL (optional — right-click post image → copy address)">
      <input class="in" id="fCap" maxlength="80" placeholder="Caption (optional)">
      <button class="btn" id="btnAdd" style="width:100%;margin-top:10px">+ Add featured post</button>
    </div>
    <h3 style="font-weight:800;margin:18px 0 4px;font-size:1em">Current featured</h3>
    <div id="list"></div>
  </div>
</div>

<script src="./app.js"></script>
<script>
const ADMIN_PIN_HASH='2b5fe57e8412615517c3d015b1f39001c9d4d2f9a2bc483e80b27e1d1e2e325c';
const ADMIN_PIN_SALT=':kimchi-rewards-admin-v1';
async function hashAdminPin(p){const b=new TextEncoder().encode(p+ADMIN_PIN_SALT);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('');}
document.getElementById('btnAdmin').addEventListener('click',async()=>{const p=document.getElementById('adminPin').value.trim();if(!p||(await hashAdminPin(p))!==ADMIN_PIN_HASH){document.getElementById('gateAlert').innerHTML='<div class="alert error">Wrong PIN.</div>';return;}document.getElementById('gate').style.display='none';document.getElementById('main').style.display='';load();});
document.getElementById('adminPin').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnAdmin').click();});

function escH(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let ITEMS={};
async function load(){
  try{const r=await fetch(`${FB_DB}/rewards/featured.json?cache=${Date.now()}`,{cache:'no-store'});ITEMS=(r.ok?(await r.json()):null)||{};}catch(_){ITEMS={};}
  const arr=Object.entries(ITEMS).map(([id,v])=>Object.assign({id},v)).sort((a,b)=>(b.ts||0)-(a.ts||0));
  document.getElementById('list').innerHTML = arr.length ? arr.map(it=>`
    <div class="card">
      ${it.image?`<img src="${escH(it.image)}" alt="">`:'<div style="width:54px;height:54px;border-radius:8px;background:#fce7f3;display:flex;align-items:center;justify-content:center;font-size:1.4em">📷</div>'}
      <div class="b"><div class="cap">${escH(it.caption||'(no caption)')}</div><a href="${escH(it.link)}" target="_blank">${escH(it.link)}</a></div>
      <button class="btn danger" onclick="del('${it.id}')">✕</button>
    </div>`).join('') : '<div style="color:var(--text-3);padding:12px">None yet.</div>';
}
async function add(){
  const link=document.getElementById('fLink').value.trim();
  if(!/^https?:\/\/.+instagram\.com\/.+/i.test(link)){alert('Paste a valid Instagram post link.');return;}
  const image=document.getElementById('fImg').value.trim();
  const caption=document.getElementById('fCap').value.trim();
  const btn=document.getElementById('btnAdd');btn.disabled=true;
  try{
    await fetch(`${FB_DB}/rewards/featured.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({link,image,caption,ts:Date.now()})});
    document.getElementById('fLink').value='';document.getElementById('fImg').value='';document.getElementById('fCap').value='';
    await load();
  }catch(e){alert('Failed: '+e.message);}finally{btn.disabled=false;}
}
async function del(id){if(!confirm('Remove this post?'))return;try{await fetch(`${FB_DB}/rewards/featured/${id}.json`,{method:'DELETE'});await load();}catch(e){alert('Failed: '+e.message);}}
window.del=del;
document.getElementById('btnAdd').addEventListener('click',add);
</script>
</body>
</html>
