<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Admin Guide · KIMCHI MART REWARDS</title>
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.app { max-width: 820px; }
.lang-toggle {
  display: flex; gap: 4px;
  background: var(--surface-2);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 16px;
}
.lang-toggle button {
  flex: 1;
  background: transparent; border: 0;
  padding: 10px;
  font-family: inherit; font-weight: 800; font-size: .9em;
  color: var(--text-3); cursor: pointer;
  border-radius: 9px;
  transition: all .15s;
  letter-spacing: .04em;
}
.lang-toggle button.active {
  background: var(--km-green); color: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.15);
}

.guide-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 12px;
}
.guide-section h3 {
  font-weight: 900; font-size: 1.05em; letter-spacing: -.01em;
  margin-bottom: 12px;
  color: var(--km-green-d);
  display: flex; align-items: center; gap: 10px;
}
.guide-section h3 .num {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--km-green); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: .92em;
}
.guide-section ol, .guide-section ul {
  margin: 0; padding-left: 22px;
  font-size: .9em; line-height: 1.65;
  color: var(--text-2);
}
.guide-section li { margin-bottom: 4px; }
.guide-section code {
  background: var(--surface-2);
  padding: 2px 7px; border-radius: 5px;
  font-family: 'SFMono-Regular', Menlo, Consolas, monospace;
  font-size: .85em;
  color: var(--km-green-d);
}
.callout {
  background: linear-gradient(135deg,#fef3c7,#fde68a);
  border: 1px solid #fcd34d;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: .85em;
  color: #78350f;
  margin-top: 8px;
  line-height: 1.5;
}
.callout.green { background: linear-gradient(135deg,#dcfce7,#86efac); border-color:#22c55e; color:#14532d; }
.callout.red { background: linear-gradient(135deg,#fee2e2,#fca5a5); border-color:#ef4444; color:#7f1d1d; }
.tool-link {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--km-green-l);
  color: var(--km-green-d);
  padding: 4px 10px;
  border-radius: 99px;
  font-weight: 800;
  font-size: .82em;
  text-decoration: none;
  margin-top: 8px;
}
.tool-link:hover { background: var(--km-green); color: #fff; }
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <a class="brand" href="./index.html">
      <span class="km-k">K</span>
      <span class="km-name">KIMCHI</span>
    </a>
    <span style="font-size:.78em;color:var(--text-3);font-weight:700;letter-spacing:.06em" id="hdrLbl">ADMIN · GUIDE</span>
  </header>

  <main class="app-main">
    <h2 style="font-weight:900;letter-spacing:-.02em;font-size:1.4em" id="pageTitle"></h2>
    <p style="color:var(--text-2);font-size:.9em;margin-top:4px;margin-bottom:14px" id="pageSub"></p>

    <!-- Lang toggle -->
    <div class="lang-toggle" id="langToggle">
      <button data-l="en" class="active">English</button>
      <button data-l="ko">한국어</button>
      <button data-l="es">Español</button>
    </div>

    <div id="guideContent"></div>
  </main>
</div>

let CUR_LANG = localStorage.getItem('admin.lang') || 'en';
if (!GUIDE[CUR_LANG]) CUR_LANG = 'en';

function render() {
  const g = GUIDE[CUR_LANG];
  document.title = g.title + ' · KIMCHI MART';
  document.getElementById('pageTitle').textContent = g.title;
  document.getElementById('pageSub').innerHTML = g.sub;
  document.querySelectorAll('#langToggle button').forEach(b => b.classList.toggle('active', b.dataset.l === CUR_LANG));
  document.getElementById('guideContent').innerHTML = g.sections.map(s => `
    <div class="guide-section">
      <h3><span class="num">${s.n}</span> <span>${s.icon}</span> ${s.title}</h3>
      <ol>${s.steps.map(step => `<li>${step}</li>`).join('')}</ol>
      ${s.callout ? `<div class="callout ${s.callout.type||''}">${s.callout.html}</div>` : ''}
      ${s.toolHref ? `<a class="tool-link" href="${s.toolHref}" target="_blank">${s.toolLbl} →</a>` : ''}
    </div>
  `).join('');
}
render();
document.getElementById('langToggle').addEventListener('click', e => {
  const b = e.target.closest('button[data-l]');
  if (!b) return;
  CUR_LANG = b.dataset.l;
  localStorage.setItem('admin.lang', CUR_LANG);
  render();
});
</script>
</body>
</html>
