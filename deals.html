<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Deals · KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.deal-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
}
.deal-row .thumb {
  width: 64px; height: 64px; border-radius: 10px;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8em; flex-shrink: 0;
  overflow: hidden;
  color: var(--text-3);
  font-weight: 800;
}
.deal-row .thumb img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

/* Flyer carousel — horizontal swipe through monthly flyer pages */
.flyer-carousel {
  position: relative;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
  margin-bottom: 12px;
  background: var(--surface-2);
}
.flyer-carousel .track {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scrollbar-width: none;            /* firefox */
  -webkit-overflow-scrolling: touch;
}
.flyer-carousel .track::-webkit-scrollbar { display: none; }
.flyer-carousel .slide {
  flex: 0 0 100%;
  scroll-snap-align: start;
  display: block;
}
.flyer-carousel .slide img {
  width: 100%;
  display: block;
  cursor: zoom-in;
}
.flyer-carousel .pager {
  position: absolute;
  left: 50%; bottom: 8px;
  transform: translateX(-50%);
  display: flex; gap: 6px;
  padding: 4px 10px;
  background: rgba(0,0,0,.45);
  border-radius: 999px;
  pointer-events: none;
}
.flyer-carousel .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.45);
  transition: background .15s, transform .15s;
}
.flyer-carousel .dot.on {
  background: #fff;
  transform: scale(1.25);
}
.flyer-carousel .count {
  position: absolute;
  top: 8px; right: 10px;
  background: rgba(0,0,0,.55);
  color: #fff;
  font-size: .72em; font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  pointer-events: none;
}

/* Prev/Next arrows — sit above the image so multi-page is obvious
   even at a glance. Auto-hide at the edges so we don't pretend
   there's content past the end. */
.flyer-carousel .nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(0,0,0,.55);
  color: #fff;
  border: 0;
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
  transition: background .15s, opacity .15s;
}
.flyer-carousel .nav-btn:hover { background: rgba(0,0,0,.75); }
.flyer-carousel .nav-btn.prev { left: 8px; }
.flyer-carousel .nav-btn.next { right: 8px; }
.flyer-carousel .nav-btn[disabled] { opacity: 0; pointer-events: none; }

/* Image lightbox — tap thumbnail to enlarge */
.img-lightbox {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.9);
  display: none;
  align-items: center; justify-content: center;
  z-index: 9999;
  padding: 20px;
  cursor: zoom-out;
  animation: lbFade .15s ease-out;
}
.img-lightbox.open { display: flex; }
.img-lightbox img {
  max-width: 100%; max-height: 100%;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  object-fit: contain;
}
.img-lightbox .close {
  position: absolute; top: 16px; right: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.15);
  border: 0; color: #fff; font-size: 24px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
@keyframes lbFade { from { opacity: 0 } to { opacity: 1 } }
.deal-row .info { flex: 1; min-width: 0; }
.deal-row .nm { font-weight: 700; font-size: .96em; line-height: 1.25; }
.deal-row .meta { font-size: .8em; color: var(--text-3); margin-top: 3px; }
.deal-row .price-row { display: flex; align-items: baseline; gap: 6px; margin-top: 4px; }
.deal-row .price { font-weight: 900; font-size: 1.05em; color: var(--km-green); letter-spacing: -.02em; }
.deal-row .strike { font-size: .8em; color: var(--text-3); text-decoration: line-through; }
.deal-row .pts-tag {
  display: inline-block; font-size: .68em; font-weight: 800;
  background: var(--km-green-l); color: var(--km-green);
  padding: 2px 6px; border-radius: 6px;
  margin-left: 4px; letter-spacing: .02em;
}
.deal-row .save-btn {
  background: var(--km-green); color: #fff;
  border: 0; border-radius: 10px;
  padding: 8px 12px;
  font-family: inherit; font-weight: 800; font-size: .82em;
  cursor: pointer;
  transition: all .15s;
  flex-shrink: 0;
}
.deal-row .save-btn:hover { background: var(--km-green-d); }
.deal-row .save-btn.saved { background: var(--surface-2); color: var(--text-3); }
.deal-row.expiring { background: linear-gradient(135deg, #fff7ed, #fef3c7); border-color: #fcd34d; }
.deal-row.expiring .pts-tag { background: var(--km-red); color: #fff; }
.dday-pill {
  display: inline-block; font-size: .7em; font-weight: 800;
  background: var(--km-red); color: #fff;
  padding: 2px 7px; border-radius: 4px;
  letter-spacing: .04em;
}
.section-banner {
  background: linear-gradient(135deg, var(--km-green), var(--km-green-d));
  color: #fff; border-radius: var(--radius);
  padding: 16px 18px; margin-bottom: 8px;
}
.section-banner .ti { font-weight: 900; font-size: 1.08em; letter-spacing: -.01em; }
.section-banner .sub { font-size: .85em; opacity: .9; margin-top: 2px; }
.section-banner.warm { background: linear-gradient(135deg, #f97316, #c2410c); }

/* Filter toggle (All / Saved) */
.filter-toggle {
  display: inline-flex; gap: 0;
  background: var(--surface-2);
  border-radius: 99px; padding: 4px;
  margin: 6px 0;
}
.filter-toggle button {
  background: transparent; border: 0; cursor: pointer;
  padding: 8px 18px; border-radius: 99px;
  font-family: inherit; font-weight: 700; font-size: .82em;
  color: var(--text-2);
  transition: all .15s;
  letter-spacing: .01em;
}
.filter-toggle button.active { background: var(--km-green); color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
.filter-toggle .count { font-weight: 800; margin-left: 4px; opacity: .85; }
</style>
</head>
<body>
<div class="app">
  <header class="app-header" id="header"></header>

  <main class="app-main">
    <div>
      <h2 style="font-weight:900;letter-spacing:-.02em;font-size:1.4em" id="pageTitle"></h2>
      <p style="color:var(--text-2);font-size:.9em;margin-top:4px" id="pageSub"></p>
    </div>

    <!-- Branch picker (which store's deals to show) -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <label style="font-size:.78em;color:var(--text-3);font-weight:700;letter-spacing:.04em" id="branchPickerLbl">📍 STORE</label>
      <select id="branchPicker" style="flex:1;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88em;font-weight:600;background:#fff;outline:none"></select>
    </div>

    <!-- Filter toggle -->
    <div class="filter-toggle" id="filterToggle">
      <button data-f="all" class="active" id="filterAll"></button>
      <button data-f="saved" id="filterSaved"></button>
    </div>

    <!-- Flyer banner (one OR more photos — swipe to flip pages) -->
    <div id="flyerCarousel" class="flyer-carousel" style="display:none"></div>

    <!-- App-only deals -->
    <div class="section-banner">
      <div class="ti" id="bannerAppOnly"></div>
      <div class="sub" id="bannerAppOnlySub"></div>
    </div>
    <div id="appOnlyList"></div>

    <!-- Expiring soon -->
    <div class="section-banner warm" style="margin-top:14px">
      <div class="ti" id="bannerExp"></div>
    </div>
    <div id="expiringList"></div>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<!-- Tap any deal thumbnail to enlarge it here -->
<div class="img-lightbox" id="imgLightbox" role="dialog" aria-label="확대 사진">
  <button type="button" class="close" id="imgLightboxClose" aria-label="닫기">×</button>
  <img id="imgLightboxImg" src="" alt="">
</div>

<script src="./app.js"></script>
<script>
const T = KMR.t.bind(KMR);
const me = KMR.requireAuth();
if (!me) {} // redirected

KMR.renderHeader(document.getElementById('header'));
KMR.renderTabBar(document.getElementById('tabbar'), 'deals');

// Read filter from URL (?filter=saved) so home card lands on Saved view
const _params = new URLSearchParams(location.search);
let FILTER = _params.get('filter') === 'saved' ? 'saved' : 'all';   // 'all' | 'saved'

function setText(id, txt) {
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}
function applyTexts() {
  try {
    document.title = T('dealsTitle') + ' · ' + T('appName');
    setText('pageTitle',         T('dealsTitle'));
    setText('pageSub',           T('dealsSub'));
    setText('bannerAppOnly',     '🎁 ' + T('dealsAppOnly'));
    setText('bannerAppOnlySub',  T('dealsSub'));
    setText('bannerExp',         '⚡ ' + T('dealsExpiring'));
    refreshFilterLabels();
  } catch (e) { console.warn('[applyTexts]', e); }
}
function refreshFilterLabels() {
  try {
    const n = KMR.countSavedDeals();
    const a = document.getElementById('filterAll');
    const s = document.getElementById('filterSaved');
    if (a) a.innerHTML = T('savedAll');
    if (s) s.innerHTML = T('savedFilter') + (n > 0 ? ` <span class="count">${n}</span>` : '');
  } catch (e) { console.warn('[refreshFilterLabels]', e); }
}
applyTexts();

// Filter toggle bind
document.getElementById('filterToggle').addEventListener('click', e => {
  const b = e.target.closest('button[data-f]');
  if (!b) return;
  FILTER = b.dataset.f;
  document.querySelectorAll('#filterToggle button').forEach(x => x.classList.toggle('active', x === b));
  applyFilter();
});
// Initial active state per URL
document.querySelectorAll('#filterToggle button').forEach(x => x.classList.toggle('active', x.dataset.f === FILTER));
function applyFilter() {
  const saved = KMR.getSavedDeals();
  document.querySelectorAll('.deal-row').forEach(el => {
    const id = el.dataset.dealId || '';
    if (FILTER === 'saved') el.style.display = saved[id] ? '' : 'none';
    else el.style.display = '';
  });
  // Hide section banners if filter empties them
  ['appOnlyList','expiringList'].forEach(secId => {
    const sec = document.getElementById(secId);
    const banner = sec.previousElementSibling;
    const visibleRows = sec.querySelectorAll('.deal-row:not([style*="none"])').length;
    if (FILTER === 'saved') {
      if (visibleRows === 0) sec.innerHTML = '';
    }
  });
  // Saved-mode empty state
  if (FILTER === 'saved' && Object.keys(saved).length === 0) {
    document.getElementById('expiringList').innerHTML =
      `<div class="empty"><div class="ic">🛒</div><div>${T('savedNone')}</div></div>`;
    document.getElementById('appOnlyList').innerHTML = '';
  }
}

// === Helpers ===
function fmtMoney(n) { return '$' + (Math.round((+n||0)*100)/100).toFixed(2); }
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString(KMR.getLang() === 'ko' ? 'ko-KR' : KMR.getLang() === 'es' ? 'es-ES' : KMR.getLang() === 'ru' ? 'ru-RU' : KMR.getLang() === 'zh' ? 'zh-CN' : 'en-US', { month:'short', day:'numeric' });
}
// (helpers moved into KMR; reuse those for cross-page consistency)

// === Render a deal row ===
function renderDeal(d, opts) {
  const isExpiring = !!opts.expiring;
  const id = String(d.id || d.barcode || d.name);
  const saved = !!KMR.getSavedDeals()[id];
  // 임박 특가에 3x 포인트 자동 부여 제거 — Vela POS 와 단방향 sync 라
  // 자동 보장 불가. d.pointsMultiplier 명시값만 사용 (없으면 표시 안 함).
  const ptsMult = d.pointsMultiplier || 1;
  const ptsTag = ptsMult > 1 ? `<span class="pts-tag">${ptsMult}× pts</span>` : '';
  const ddayHtml = isExpiring && d.dday != null ? `<span class="dday-pill">D-${d.dday}</span> ` : '';
  const thumbHtml = d.image
    ? `<div class="thumb"><img src="${d.image}" alt="" loading="lazy"></div>`
    : `<div class="thumb">${(d.name||'').slice(0,2).toUpperCase()}</div>`;
  const validUntil = d.expiresAt ? T('dealsValidUntil', { date: fmtDate(d.expiresAt) }) : '';

  return `
    <div class="deal-row ${isExpiring?'expiring':''}" data-deal-id="${escAttr(id)}">
      ${thumbHtml}
      <div class="info">
        <div class="nm">${ddayHtml}${escHtml(d.name||'')}</div>
        <div class="meta">${escHtml(d.size||'')} ${validUntil ? '· '+validUntil : ''}</div>
        <div class="price-row">
          <span class="price">${fmtMoney(d.price)}</span>
          ${d.regularPrice && d.regularPrice > d.price ? `<span class="strike">${fmtMoney(d.regularPrice)}</span>` : ''}
          ${ptsTag}
        </div>
      </div>
      <button class="save-btn ${saved?'saved':''}"
              data-id="${escAttr(id)}"
              data-name="${escAttr(d.name||'')}"
              data-image="${escAttr(d.image||'')}"
              data-price="${escAttr(d.price||'')}"
              data-expiry="${escAttr(d.expiry||'')}"
              data-dday="${escAttr(d.dday!=null?d.dday:'')}">
        ${saved ? T('dealsClaimed') : T('dealsClaim')}
      </button>
    </div>
  `;
}

function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }

// Render the monthly flyer as a horizontal-swipe carousel. Single page
// just shows one image; multi-page adds a counter pill (1/N) and dots.
// Tapping any slide opens the existing fullscreen lightbox.
function renderFlyerCarousel(srcs) {
  const host = document.getElementById('flyerCarousel');
  if (!host) return;
  if (!srcs || !srcs.length) {
    host.style.display = 'none';
    host.innerHTML = '';
    return;
  }
  host.style.display = '';
  const slides = srcs.map((s, i) =>
    `<div class="slide"><img src="${s}" alt="Flyer page ${i+1}" loading="lazy"></div>`
  ).join('');
  const multi = srcs.length > 1;
  const dots = multi
    ? `<div class="pager">${srcs.map((_, i) => `<div class="dot${i===0?' on':''}"></div>`).join('')}</div>`
    : '';
  const counter = multi ? `<div class="count" id="flyerCount">1 / ${srcs.length}</div>` : '';
  // Prev/Next arrows only render in multi-page mode — and prev starts
  // disabled because we always begin on page 1.
  const arrows = multi
    ? `<button type="button" class="nav-btn prev" id="flyerPrev" aria-label="이전 페이지" disabled>◀</button>
       <button type="button" class="nav-btn next" id="flyerNext" aria-label="다음 페이지">▶</button>`
    : '';
  host.innerHTML = `<div class="track" id="flyerTrack">${slides}</div>${arrows}${dots}${counter}`;

  // Update active dot + counter + arrow disabled-state on scroll.
  // Throttled via rAF so swiping stays smooth on slower phones.
  if (multi) {
    const track = document.getElementById('flyerTrack');
    const dotEls = host.querySelectorAll('.dot');
    const countEl = document.getElementById('flyerCount');
    const prevBtn = document.getElementById('flyerPrev');
    const nextBtn = document.getElementById('flyerNext');
    let raf = 0;
    const sync = () => {
      const idx = Math.round(track.scrollLeft / track.clientWidth);
      dotEls.forEach((d, i) => d.classList.toggle('on', i === idx));
      if (countEl) countEl.textContent = `${idx+1} / ${srcs.length}`;
      prevBtn.disabled = idx <= 0;
      nextBtn.disabled = idx >= srcs.length - 1;
    };
    track.addEventListener('scroll', () => {
      if (raf) return;
      raf = requestAnimationFrame(() => { raf = 0; sync(); });
    });
    // Arrow clicks scroll one page in either direction. Smooth-scroll
    // hooks the snap behavior so the next slide always lands aligned.
    const goto = (delta) => {
      const idx = Math.round(track.scrollLeft / track.clientWidth);
      const next = Math.max(0, Math.min(srcs.length - 1, idx + delta));
      track.scrollTo({ left: next * track.clientWidth, behavior: 'smooth' });
    };
    prevBtn.addEventListener('click', e => { e.stopPropagation(); goto(-1); });
    nextBtn.addEventListener('click', e => { e.stopPropagation(); goto(+1); });
  }
}

// Lightbox — tap any deal thumbnail to see the full-size photo.
// Click outside the image, the × button, or press Esc to close.
(function setupLightbox(){
  const lb = document.getElementById('imgLightbox');
  const lbImg = document.getElementById('imgLightboxImg');
  const lbClose = document.getElementById('imgLightboxClose');
  if (!lb || !lbImg) return;

  function open(src){
    if (!src) return;
    lbImg.src = src;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';   // prevent background scroll
  }
  function close(){
    lb.classList.remove('open');
    lbImg.src = '';
    document.body.style.overflow = '';
  }

  // Delegate clicks: any deal-row thumbnail OR flyer carousel slide opens
  // the lightbox. Listening at document level handles items rendered
  // later by loadAppOnly() / loadExpiring() / renderFlyerCarousel().
  document.addEventListener('click', e => {
    const img = e.target.closest('.deal-row .thumb img, .flyer-carousel .slide img');
    if (!img) return;
    e.preventDefault();
    e.stopPropagation();
    open(img.src);
  });

  // Backdrop click closes (clicks on the image itself bubble to backdrop too,
  // but the close-on-anywhere behavior is fine — they tap once to close).
  lb.addEventListener('click', close);
  lbClose.addEventListener('click', e => { e.stopPropagation(); close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
})();

// Branch picker state — what store's deals the customer wants to see
let CUR_DEAL_BRANCH = localStorage.getItem('rewards.dealBranch') ||
                      (me && me.branch) || 'AUTO';
function initBranchPicker() {
  try {
    const sel = document.getElementById('branchPicker');
    if (!sel) return;
    const branches = (typeof window !== 'undefined' && Array.isArray(window.BRANCHES)) ? window.BRANCHES : [];
    const myBranch = (me && me.branch) || '';
    sel.innerHTML =
      `<option value="AUTO">${myBranch ? '🎯 My store ('+myBranch+')' : '🏪 All stores'}</option>` +
      branches.map(b => `<option value="${b.id}">📍 ${b.name}${b.comingSoon?' (coming soon)':''}</option>`).join('');
    sel.value = CUR_DEAL_BRANCH;
    sel.addEventListener('change', () => {
      CUR_DEAL_BRANCH = sel.value;
      localStorage.setItem('rewards.dealBranch', CUR_DEAL_BRANCH);
      loadAppOnly();
      loadExpiring();
    });
  } catch (e) { console.warn('[initBranchPicker]', e); }
}

// === Load app-only deals from RTDB ===
// We support two storage shapes (back-compat):
//   1) /rewards/deals_app_only/<weekId>           — old, store-agnostic
//   2) /rewards/deals_app_only/<branch>/<weekId>  — new, store-scoped
async function loadAppOnly() {
  try {
    const week = isoWeekId();
    const lastWeek = isoWeekId(-1);   // previous week fallback when manager
                                       // hasn't uploaded this week's deals yet
    // Determine which store's deals to fetch
    let myBranch;
    if (CUR_DEAL_BRANCH === 'AUTO') {
      myBranch = (me && me.branch) ? me.branch : null;
    } else {
      myBranch = CUR_DEAL_BRANCH;
    }
    const now = Date.now();

    // Fetch in parallel: ALL store deals + my-branch deals (current week
    // first, then last week as a fallback). The merge step below drops
    // anything past its expiresAt, so stale weeks never leak through.
    const urls = [
      `${FB_DB}/rewards/deals_app_only/ALL/${week}.json`,
      `${FB_DB}/rewards/deals_app_only/${week}.json`,              // legacy fallback
      `${FB_DB}/rewards/deals_app_only/ALL/${lastWeek}.json`,
      `${FB_DB}/rewards/deals_app_only/${lastWeek}.json`
    ];
    if (myBranch) {
      urls.push(`${FB_DB}/rewards/deals_app_only/${myBranch}/${week}.json`);
      urls.push(`${FB_DB}/rewards/deals_app_only/${myBranch}/${lastWeek}.json`);
    }

    const responses = await Promise.all(urls.map(u =>
      fetch(u + '?cache=' + Date.now(), { cache:'no-store' })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));

    // Merge items, dedupe by id, drop expired
    const seen = new Set();
    const merged = [];
    let flyerSrcs = [];   // first non-empty flyerImages array we encounter
    for (const d of responses) {
      if (!d) continue;
      // Multi-page (new) takes precedence; legacy single-image is wrapped.
      if (!flyerSrcs.length) {
        if (Array.isArray(d.flyerImages) && d.flyerImages.length) {
          flyerSrcs = d.flyerImages.filter(Boolean);
        } else if (d.flyerImage) {
          flyerSrcs = [d.flyerImage];
        }
      }
      if (!d.items) continue;
      const exp = d.expiresAt;
      if (exp && exp < now) continue;
      for (const it of d.items) {
        const key = it.id || (it.name + ':' + it.price);
        if (seen.has(key)) continue;
        seen.add(key);
        merged.push({ ...it, expiresAt: it.expiresAt || exp });
      }
    }

    // Show / hide flyer banner — render a horizontal carousel when there
    // are multiple pages, fall back to single-image for the legacy case.
    renderFlyerCarousel(flyerSrcs);

    const list = document.getElementById('appOnlyList');
    const sectionBanner = document.querySelector('.section-banner');
    if (merged.length === 0) {
      // If we still have a flyer banner, the customer already sees a big
      // visual on top — hide the 'No deals' state and the duplicate header
      // so the page doesn't look empty.
      if (flyerSrcs.length) {
        list.innerHTML = '';
        if (sectionBanner) sectionBanner.style.display = 'none';
      } else {
        list.innerHTML = `<div class="empty"><div class="ic">🎁</div><div>${T('dealsNone')}</div></div>`;
        if (sectionBanner) sectionBanner.style.display = '';
      }
      return;
    }
    if (sectionBanner) sectionBanner.style.display = '';
    list.innerHTML = merged.map(d => renderDeal(d, { expiring: false })).join('');
    bindSaves(list);
  } catch(e) { console.error(e); }
}

// === Load expiring soon (links to expiry tracker data, manager-side) ===
async function loadExpiring() {
  try {
    // Follow the store picker (CUR_DEAL_BRANCH); 'AUTO' → customer's home store.
    const branch = (CUR_DEAL_BRANCH && CUR_DEAL_BRANCH !== 'AUTO') ? CUR_DEAL_BRANCH : (me.branch || 'MIAMI');
    const today = isoDate();
    // Read manager-side expiry data; surface items with D-3..D-1
    const r = await fetch(`${FB_DB}/expiry/${branch}.json?cache=${Date.now()}`);
    const data = r.ok ? await r.json() : null;
    const list = document.getElementById('expiringList');
    if (!data) {
      list.innerHTML = `<div class="empty"><div class="ic">⚡</div><div>${T('dealsNone')}</div></div>`;
      return;
    }
    // Flatten products across all sub-nodes
    const flat = [];
    Object.values(data).forEach(node => {
      if (node && typeof node === 'object') {
        Object.values(node).forEach(item => {
          if (item && item.expiry && item.name) flat.push(item);
        });
      }
    });
    const todayD = new Date(); todayD.setHours(0,0,0,0);
    const enriched = flat.map(p => {
      const e = new Date(p.expiry); e.setHours(0,0,0,0);
      const dday = Math.round((e - todayD) / 86400000);
      return { ...p, dday, regularPrice: p.price, price: p.price ? Math.round(p.price * 0.7 * 100)/100 : null };
    }).filter(p => p.dday >= 0 && p.dday <= 3 && (p.status !== 'discarded'));
    enriched.sort((a,b) => a.dday - b.dday);

    if (enriched.length === 0) {
      list.innerHTML = `<div class="empty"><div class="ic">⚡</div><div>${T('dealsNone')}</div></div>`;
      return;
    }
    list.innerHTML = enriched.slice(0, 12).map(p => renderDeal({
      id: p.id || p.barcode,
      name: p.name,
      image: p.photo,
      price: p.price,
      regularPrice: p.regularPrice,
      size: p.qty ? p.qty + ' in stock' : '',
      dday: p.dday
    }, { expiring: true })).join('');
    bindSaves(list);
  } catch(e) { console.error(e); }
}

function bindSaves(container) {
  container.querySelectorAll('.save-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const isSaved = btn.classList.contains('saved');
      if (isSaved) {
        KMR.removeSavedDeal(id);
        btn.classList.remove('saved');
        btn.textContent = T('dealsClaim');
      } else {
        KMR.setSavedDeal(id, {
          name: btn.dataset.name || '',
          image: btn.dataset.image || '',
          price: parseFloat(btn.dataset.price) || 0,
          expiry: btn.dataset.expiry || '',
          dday: btn.dataset.dday !== '' ? parseInt(btn.dataset.dday, 10) : null
        });
        btn.classList.add('saved');
        btn.textContent = T('dealsClaimed');
      }
      refreshFilterLabels();
      if (FILTER === 'saved') applyFilter();
    });
  });
}

function isoDate() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isoWeekId(offsetWeeks) {
  const d = new Date();
  if (offsetWeeks) d.setDate(d.getDate() + offsetWeeks * 7);
  const onejan = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - onejan) / 86400000 + onejan.getDay() + 1) / 7);
  return d.getFullYear() + '-W' + String(week).padStart(2,'0');
}

// Prune expired saves first (so count is correct)
KMR.pruneSavedDeals();
initBranchPicker();

Promise.all([loadAppOnly(), loadExpiring()]).then(() => {
  refreshFilterLabels();
  if (FILTER === 'saved') applyFilter();
});

window.addEventListener('rewards-lang-changed', () => location.reload());
KMR.registerSW();
</script>
