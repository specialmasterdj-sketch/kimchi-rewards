<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./pwa-assets/apple-touch-icon.png">
<link rel="stylesheet" href="./style.css">
<!-- JsBarcode for CODE128 generation -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header class="app-header" id="header"></header>

  <!-- Main -->
  <main class="app-main">
    <!-- Notice (birthday / app-only deal teaser) — hidden by default -->
    <div id="notice" style="display:none"></div>

    <!-- Membership card (K1 / K2 / trial) — hidden if no active membership -->
    <div id="membershipCard" style="display:none"></div>

    <!-- Saved deals card (only if any saved) -->
    <a id="savedCard" href="./deals.html" style="display:none;text-decoration:none;color:inherit">
      <div class="card" style="display:flex;align-items:center;gap:12px;border-color:var(--km-green);background:var(--km-green-l)">
        <div style="font-size:1.6em">🛒</div>
        <div style="flex:1">
          <div style="font-weight:800;color:var(--km-green-d)" id="savedCardTi"></div>
          <div style="font-size:.82em;color:var(--km-green-d);opacity:.8" id="savedCardSub"></div>
        </div>
        <div style="color:var(--km-green);font-size:1.4em">›</div>
      </div>
    </a>

    <!-- Barcode (most-used in store) -->
    <div class="barcode-card">
      <div class="barcode-label" id="lblBarcode">YOUR REWARDS CODE</div>
      <svg id="barcodeSvg"></svg>
      <div class="phone-display" id="phoneDisplay"></div>
      <div class="scan-hint" id="hintScan">Show this at checkout</div>
    </div>

    <!-- Points + Hero -->
    <div class="card hero">
      <div class="label" id="lblBalance">POINTS BALANCE</div>
      <div class="points">
        <span id="ptsValue">0</span><span class="points-unit" id="ptsUnit">pts</span>
      </div>
      <div class="sub" id="memberSub"></div>
      <div id="ptsHelper" style="font-size:.78em;opacity:.85;margin-top:6px"></div>
    </div>

    <!-- Tier card -->
    <div class="card tier-card">
      <div class="tier-row">
        <div class="tier-badge" id="tierBadge">🥉</div>
        <div class="tier-info">
          <div class="name" id="tierName">Bronze</div>
          <div class="next" id="tierNext">Spend $100 more to reach Silver</div>
        </div>
      </div>
      <div class="tier-progress"><div class="fill" id="tierFill" style="width:0%"></div></div>
    </div>

    <!-- Section: quick actions -->
    <div class="sec-title" id="secMore">MORE</div>
    <div class="quick-grid">
      <a class="quick-btn" href="./deals.html">
        <div class="ic">🎁</div>
        <div class="lbl" id="qaDealsLbl"></div>
        <div class="desc" id="qaDealsDesc"></div>
      </a>
      <a class="quick-btn" href="./refer.html">
        <div class="ic">👥</div>
        <div class="lbl" id="qaReferLbl"></div>
        <div class="desc" id="qaReferDesc"></div>
      </a>
      <a class="quick-btn" href="./membership.html">
        <div class="ic">💎</div>
        <div class="lbl" id="qaSubLbl"></div>
        <div class="desc" id="qaSubDesc"></div>
      </a>
      <a class="quick-btn" href="./history.html">
        <div class="ic">📋</div>
        <div class="lbl" id="qaHistLbl"></div>
        <div class="desc" id="qaHistDesc"></div>
      </a>
    </div>
  </main>

  <!-- Tab bar -->
  <nav class="tabbar" id="tabbar"></nav>
</div>

<script src="./app.js"></script>
<script>
const T = KMR.t.bind(KMR);
const me = KMR.requireAuth();
if (!me) { /* redirect happened */ }

// === Render shared UI ===
KMR.renderHeader(document.getElementById('header'));
KMR.renderTabBar(document.getElementById('tabbar'), 'home');

// === Apply static labels ===
function applyTexts(){
  document.title = T('appName');
  document.getElementById('lblBarcode').textContent = T('yourBarcode');
  document.getElementById('hintScan').textContent = T('scanAtCheckout');
  document.getElementById('lblBalance').textContent = T('pointsBalance');
  document.getElementById('ptsUnit').textContent = T('pointsUnit');
  document.getElementById('secMore').textContent = T('tabAccount').toUpperCase();  // placeholder
  document.getElementById('qaDealsLbl').textContent = T('qaDeals');
  document.getElementById('qaDealsDesc').textContent = T('qaDealsDesc');
  document.getElementById('qaReferLbl').textContent = T('qaRefer');
  document.getElementById('qaReferDesc').textContent = T('qaReferDesc');
  document.getElementById('qaSubLbl').textContent = T('qaMember');
  document.getElementById('qaSubDesc').textContent = T('qaMemberDesc');
  document.getElementById('qaHistLbl').textContent = T('qaHistory');
  document.getElementById('qaHistDesc').textContent = T('qaHistoryDesc');
  document.getElementById('phoneDisplay').textContent = KMR.fmtPhone(me.phone);
}
applyTexts();

// === Render barcode (CODE128 of phone digits) ===
function renderBarcode(){
  try {
    const code = KMR.phoneKey(me.phone);  // digits only, e.g. 13055551234
    JsBarcode('#barcodeSvg', code, {
      format: 'CODE128',
      displayValue: false,
      width: 2.4,
      height: 78,
      margin: 0,
      background: '#ffffff',
      lineColor: '#0f0f0f'
    });
  } catch(e){ console.error(e); }
}
renderBarcode();

// === Membership card ===
function renderMembershipCard(c, mem) {
  const el = document.getElementById('membershipCard');
  if (!mem) { el.style.display = 'none'; return; }

  const isTrial = mem.grantType === 'auto-trial';
  const isK2 = mem.plan === 'k2';
  const days = KMR.daysUntilMembershipExpiry(c);
  const expiringSoon = isTrial && days != null && days <= 30;

  const planName = isK2 ? T('membK2Name') : T('membK1Name');
  const discount = isK2 ? T('membDiscount10') : T('membDiscount5');
  const planEmoji = isK2 ? '💎' : '⭐';

  // Color schemes
  let bg, text, accent;
  if (expiringSoon) {
    bg = 'linear-gradient(135deg,#fef3c7,#fcd34d)';
    text = '#78350f';
    accent = '#b45309';
  } else if (isTrial) {
    bg = 'linear-gradient(135deg,#dcfce7,#86efac)';
    text = '#065f46';
    accent = '#059669';
  } else if (isK2) {
    bg = 'linear-gradient(135deg,#dbeafe,#93c5fd)';
    text = '#1e40af';
    accent = '#2563eb';
  } else {
    bg = 'linear-gradient(135deg,#fef3c7,#fde68a)';
    text = '#78350f';
    accent = '#b45309';
  }

  let badgeText = '';
  if (isTrial) badgeText = T('membTrial');
  else badgeText = T('membActive').toUpperCase();

  let footerHtml = '';
  if (expiringSoon) {
    footerHtml = `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(0,0,0,.1)">
        <div style="font-weight:800;font-size:.92em;color:${text}">${T('membExpiringTi', { n: days })}</div>
        <div style="font-size:.82em;color:${text};opacity:.85;margin-top:2px">${T('membExpiringSub')}</div>
      </div>`;
  } else if (isTrial && days != null) {
    const expDate = new Date(c.membership.expiresAt);
    const lang = KMR.getLang();
    const localeMap = { en:'en-US', es:'es-ES', ru:'ru-RU', zh:'zh-CN', ko:'ko-KR' };
    const dateStr = expDate.toLocaleDateString(localeMap[lang]||'en-US', { year:'numeric', month:'short', day:'numeric' });
    footerHtml = `<div style="font-size:.78em;color:${text};opacity:.75;margin-top:6px">${T('membExpires', { date: dateStr })} (${days} days)</div>`;
  }

  el.style.display = '';
  el.innerHTML = `
    <div style="background:${bg};color:${text};border-radius:14px;padding:18px 20px;box-shadow:0 4px 16px rgba(0,0,0,.08)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:1.8em">${planEmoji}</div>
          <div>
            <div style="font-weight:900;font-size:1.15em;letter-spacing:-.01em">${planName}</div>
            <div style="font-size:.85em;opacity:.85;margin-top:1px">${discount}</div>
          </div>
        </div>
        <div style="background:${accent};color:#fff;font-size:.7em;font-weight:800;padding:4px 10px;border-radius:99px;letter-spacing:.06em;white-space:nowrap">${badgeText}</div>
      </div>
      ${footerHtml}
    </div>
  `;
}

// === Saved deals card ===
function renderSavedCard() {
  const n = KMR.countSavedDeals();   // also prunes expired
  const card = document.getElementById('savedCard');
  if (n > 0) {
    card.style.display = '';
    document.getElementById('savedCardTi').textContent = T('savedHomeTi', { n: n, s: n === 1 ? '' : 's' });
    document.getElementById('savedCardSub').textContent = T('savedHomeSub');
    card.href = './deals.html?filter=saved';
  } else {
    card.style.display = 'none';
  }
}
renderSavedCard();

// === Load customer data ===
async function loadData(){
  const c = await KMR.fetchCustomer(me.phone);
  if (!c) return;

  // Points
  document.getElementById('ptsValue').textContent = (c.points||0).toLocaleString();

  // Points helper text — depends on membership status
  const mem = KMR.getActiveMembership(c);
  const ptsHelper = document.getElementById('ptsHelper');
  if (mem) {
    ptsHelper.textContent = T('memberNoPoints');
  } else {
    ptsHelper.textContent = T('pointsAsCash');
  }

  // Membership card — only if active
  renderMembershipCard(c, mem);

  // Tier
  const tier = KMR.calcTier(c.totalSpent_30d || 0);
  const tierName = tier.name;
  document.getElementById('tierBadge').textContent = tier.emoji;
  document.getElementById('tierBadge').className = 'tier-badge ' + tier.key;
  document.getElementById('tierName').textContent = `${tierName} ${T('tierMember')}`;
  document.getElementById('memberSub').textContent = `${tier.emoji} ${tierName} ${T('tierMember')} · ${c.name||''}`;

  if (tier.next) {
    const remain = Math.max(0, tier.next - tier.cur);
    document.getElementById('tierNext').textContent = T('tierProgress', { amt: remain.toFixed(0), next: tier.nextName });
    // Progress within current band
    const span = tier.next - tier.threshold;
    const filled = Math.max(0, tier.cur - tier.threshold);
    const pct = Math.min(100, Math.round(filled / span * 100));
    document.getElementById('tierFill').style.width = pct + '%';
  } else {
    document.getElementById('tierNext').textContent = T('tierMaxed');
    document.getElementById('tierFill').style.width = '100%';
  }

  // Birthday notice — exact day = HUGE banner (3x pts + gift); same month = soft reminder
  const now = new Date();
  const curMonth = now.getMonth() + 1;
  const curDay = now.getDate();
  const isBirthDay = c.birthMonth && c.birthDay && c.birthMonth === curMonth && c.birthDay === curDay;
  const isBirthMonth = c.birthMonth && c.birthMonth === curMonth && !isBirthDay;
  if (isBirthDay) {
    const notice = document.getElementById('notice');
    notice.style.display = '';
    notice.innerHTML = `
      <div class="notice" style="background:linear-gradient(135deg,#fef3c7,#fcd34d);border-color:#f59e0b">
        <div class="ic" style="font-size:1.8em">🎂</div>
        <div class="text">
          <div class="ti" style="color:#78350f;font-size:1em">${T('noticeBirthdayTi')}</div>
          <div class="sub" style="color:#92400e">${T('noticeBirthdaySub')}</div>
        </div>
      </div>`;
  } else if (isBirthMonth) {
    const notice = document.getElementById('notice');
    notice.style.display = '';
    notice.innerHTML = `
      <div class="notice">
        <div class="ic">🎁</div>
        <div class="text">
          <div class="ti">${T('noticeBirthMonth')}</div>
          <div class="sub">${T('birthHint')}</div>
        </div>
      </div>`;
  }
}
loadData();

// === Re-render on lang change ===
window.addEventListener('rewards-lang-changed', () => location.reload());

// === Register SW ===
KMR.registerSW();
</script>
</body>
</html>
