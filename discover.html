<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Discover · KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.follow-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.follow-btn{border-radius:var(--radius);padding:16px 12px;text-decoration:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:6px;font-weight:800;box-shadow:var(--shadow-sm);transition:transform .15s}
.follow-btn:hover{transform:translateY(-2px)}
.follow-btn .ic{font-size:1.7em;line-height:1}
.follow-btn .h{font-size:.96em}
.follow-btn .s{font-size:.74em;font-weight:600;opacity:.92}
.follow-btn.ig{background:linear-gradient(135deg,#feda75,#fa7e1e 35%,#d62976 65%,#962fbf 90%)}
.follow-btn.yt{background:#FF0000}
.sec-h{font-weight:900;font-size:1.05em;letter-spacing:-.01em;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.vid-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.vid-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s}
.vid-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.vid-card .thumb{position:relative;width:100%;aspect-ratio:16/9;background:#000;display:block;object-fit:cover}
.vid-card .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:2.2em;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none}
.vid-card .vt{font-size:.84em;font-weight:700;color:var(--text);padding:9px 10px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vid-embed{grid-column:1/-1;aspect-ratio:16/9;border-radius:var(--radius);overflow:hidden;background:#000}
.vid-embed iframe{width:100%;height:100%;border:0}
.fallback{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:22px;text-align:center;color:var(--text-2)}
.fallback a{color:#FF0000;font-weight:800}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:inherit;display:block;transition:transform .15s}
.feat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.feat-card .fimg{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:linear-gradient(135deg,#feda75,#fa7e1e 35%,#d62976 65%,#962fbf 90%)}
.feat-card .fimg.ph{display:flex;align-items:center;justify-content:center;font-size:2.4em;color:#fff}
.feat-card .fcap{font-size:.82em;font-weight:700;color:var(--text);padding:9px 10px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.feat-card .fcap .ig{color:#d62976;font-weight:800;font-size:.92em}
</style>
</head>
<body>
<div class="app">
  <header class="app-header" id="header"></header>
  <main class="app-main">
    <div>
      <h2 style="font-weight:900;letter-spacing:-.02em;font-size:1.4em" id="pageTitle"></h2>
      <p style="color:var(--text-2);font-size:.9em;margin-top:4px" id="pageSub"></p>
    </div>

    <div class="follow-row">
      <a class="follow-btn ig" id="igBtn" target="_blank" rel="noopener">
        <span class="ic">📷</span><span class="h" id="igH">Instagram</span><span class="s">@kimchimartmiami</span>
      </a>
      <a class="follow-btn yt" id="ytBtn" target="_blank" rel="noopener">
        <span class="ic">▶️</span><span class="h" id="ytH">YouTube</span><span class="s">@kimchimarttv</span>
      </a>
    </div>

    <!-- 🆕 이번 주 신상품 — 다국어, JS 렌더 (배치마다 아래 NI_ITEMS 교체). -->
    <style>
      .ni-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:22px}
      .ni-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
      .ni-card .ni-img{width:100%;aspect-ratio:360/224;object-fit:cover;display:block;background:#f6f6f6}
      .ni-card .ni-b{padding:8px 10px 10px}
      .ni-card .ni-n{font-size:.86em;font-weight:800;color:var(--text);line-height:1.3}
      .ni-card .ni-d{font-size:.76em;color:var(--text-2);margin-top:3px;line-height:1.35}
      .ni-badge{display:inline-block;background:#e8f5e9;color:#1a5c3a;font-size:.66em;font-weight:800;padding:2px 7px;border-radius:20px;margin-bottom:3px}
    </style>
    <div style="margin-top:4px">
      <div class="sec-h">🆕 <span id="niHead"></span></div>
      <p style="color:var(--text-2);font-size:.84em;margin:-2px 0 12px" id="niSub"></p>
      <div class="ni-grid" id="niGrid"></div>
    </div>

    <div id="showcaseSec" style="display:none">
      <div class="sec-h">⭐ <span id="showH"></span></div>
      <div id="showcase"></div>
    </div>

    <div id="featuredSec" style="display:none">
      <div class="sec-h">📷 <span id="featH"></span></div>
      <div class="feat-grid" id="featured"></div>
    </div>

    <div class="sec-h">🎬 <span id="latestH"></span></div>
    <div id="videos"><div class="fallback" id="vidLoading">…</div></div>
  </main>
  <nav class="tabbar" id="tabbar"></nav>
</div>

<script src="./app.js"></script>
<script>
const T = KMR.t.bind(KMR);
const me = KMR.requireAuth();
KMR.renderHeader(document.getElementById('header'));
KMR.renderTabBar(document.getElementById('tabbar'), 'home');

// ===== 🆕 이번 주 신상품 (다국어) — 배치마다 NI_ITEMS 교체하면 됨 =====
const NI_TXT = {
  head:{ko:'이번 주 신상품', en:'New This Week', es:'Novedades de la semana'},
  sub: {ko:'방금 들어온 한국 신상품이에요 🇰🇷 매장에서 만나보세요!', en:'Fresh Korean arrivals 🇰🇷 — come see them in store!', es:'¡Novedades coreanas recién llegadas 🇰🇷 — visítanos en la tienda!'},
  hot: {ko:'화제', en:'Hot', es:'Popular'}
};
const NI_ITEMS = [
  {img:'faker.jpg', hot:true,  n:{ko:'팔도 왕뚜껑 페이커 에디션', en:'Paldo King Bowl — FAKER Edition', es:'Paldo King Bowl — Edición FAKER'}, d:{ko:'LoL 황제 ‘페이커’ 콜라보 큰사발 왕뚜껑', en:'LoL legend Faker collab — jumbo bowl ramen', es:'Colaboración con Faker (LoL) — tazón grande'}},
  {img:'ramen_chef.jpg', hot:true, n:{ko:'농심 라면 셰프 — 크리미 갈릭치킨', en:'Nongshim Ramyun Chef — Creamy Garlic Chicken', es:'Nongshim Ramyun Chef — Pollo al Ajo Cremoso'}, d:{ko:'신라면의 새로운 변신, 진한 갈릭치킨', en:'A bold new twist on Shin Ramyun', es:'Un nuevo giro audaz del Shin Ramyun'}},
  {img:'tteokbokki.jpg', n:{ko:'청정원 매콤달콤 찰꼬마 떡볶이', en:'Sweet & Spicy Mini Tteokbokki', es:'Mini Tteokbokki Dulce y Picante'}, d:{ko:'소스까지 들어있어 데우기만 하면 끝', en:'Sauce included — just heat & enjoy', es:'Con salsa incluida — solo calienta'}},
  {img:'yupgi_rose.jpg', n:{ko:'엽기떡볶이 로제맛', en:'Yupgi Tteokbokki — Rosé', es:'Yupgi Tteokbokki — Rosé'}, d:{ko:'엽떡 No.1 매운맛, 부드러운 로제로', en:"Korea's No.1 spicy tteokbokki, now creamy rosé", es:'El tteokbokki picante No.1, ahora rosé cremoso'}},
  {img:'hotteok.jpg', n:{ko:'사옹원 옛날 꿀호떡', en:'Saongwon Honey Hotteok', es:'Hotteok de Miel Saongwon'}, d:{ko:'쫄깃한 호떡, 에어프라이어로 간편하게', en:'Chewy Korean sweet pancakes — air-fryer ready', es:'Panqueques coreanos — listos en freidora de aire'}},
  {img:'bungeoppang.jpg', n:{ko:'오디저트 단팥 붕어빵', en:"O!Dessert Red Bean Bungeoppang", es:'Bungeoppang de Frijol Rojo'}, d:{ko:'겨울 간식 붕어빵, 집에서 데워 바로', en:'Fish-shaped cakes — a Korean winter treat at home', es:'Pastelitos en forma de pez — para casa'}},
  {img:'creambread.jpg', n:{ko:'오디저트 순우유 크림빵', en:"O!Dessert Milk Cream Bread", es:'Pan con Crema de Leche'}, d:{ko:'부드러운 우유크림이 가득', en:'Soft bread filled with milk cream', es:'Pan suave relleno de crema de leche'}},
  {img:'icecream.jpg', n:{ko:'아이스팩토리 치킨척 아이스크림', en:"Ice Factory 'Chicken Chuck' Ice Cream", es:"Helado 'Chicken Chuck'"}, d:{ko:'닭다리 모양?! 바삭한 드럼 아이스크림', en:'Fried-chicken shaped?! Crispy drumstick ice cream', es:'¿En forma de pollo frito? Helado crujiente'}},
  {img:'tingle_soda.jpg', n:{ko:'팅글 사과식초 소다 (파인애플)', en:'Tingle Apple Cider Vinegar Soda (Pineapple)', es:'Soda de Vinagre de Manzana Tingle (Piña)'}, d:{ko:'상큼한 애플사이다비니거 탄산음료', en:'Refreshing sparkling ACV drink', es:'Bebida gaseosa refrescante de vinagre'}}
];
(function renderNewItems(){
  const lang = (KMR.getLang && KMR.getLang()) || 'ko';
  const pick = o => o[lang] || o.en || o.ko;
  const head = document.getElementById('niHead'); if (head) head.textContent = pick(NI_TXT.head);
  const sub = document.getElementById('niSub'); if (sub) sub.textContent = pick(NI_TXT.sub);
  const grid = document.getElementById('niGrid'); if (!grid) return;
  grid.innerHTML = NI_ITEMS.map(it => `
    <div class="ni-card">
      <img class="ni-img" loading="lazy" src="images/newitems/${it.img}?v=3" alt="">
      <div class="ni-b">${it.hot ? `<span class="ni-badge">🔥 ${pick(NI_TXT.hot)}</span>` : ''}<div class="ni-n">${pick(it.n)}</div><div class="ni-d">${pick(it.d)}</div></div>
    </div>`).join('');
})();

// ===== config =====
const IG_HANDLE = 'kimchimartmiami';
const YT_HANDLE = 'kimchimarttv';
// YouTube Data API v3 key (2026-06-08, dedicated key, restricted to YouTube Data API v3).
//   To rotate: console.cloud.google.com → Credentials → new API key → paste here.
//   Security: add HTTP-referrer restriction (specialmasterdj-sketch.github.io/*) in Cloud console.
const YT_API_KEY = 'AIzaSyA-D08FMH-5IXp24ny8F4rQN2can9RStc0';
// Channel uploads playlist for @kimchimarttv (resolved once; skips channels.list call).
const YT_UPLOADS = 'UU6PTaXKmzkWzKPI--eNSvyA';
const VIDEO_COUNT = 12;

const L18 = {
  title:  { en:'Discover', es:'Descubre', ko:'둘러보기' },
  sub:    { en:'Watch, follow, and see what’s fresh at KIMCHI MART.', es:'Mira, sigue y descubre lo nuevo en KIMCHI MART.', ko:'김치마트의 영상·소식을 구경하고 팔로우하세요.' },
  ig:     { en:'Follow', es:'Seguir', ko:'팔로우' },
  yt:     { en:'Subscribe', es:'Suscríbete', ko:'구독' },
  latest: { en:'Latest videos', es:'Videos recientes', ko:'최신 영상' },
  featured:{ en:'Featured posts', es:'Posts destacados', ko:'추천 게시물' },
  member: { en:'From our members', es:'De nuestros miembros', ko:'멤버들이 올린 콘텐츠' },
  viewPost:{ en:'View post', es:'Ver publicación', ko:'게시물 보기' },
  viewIg: { en:'View on Instagram', es:'Ver en Instagram', ko:'인스타에서 보기' },
  watch:  { en:'Watch on YouTube', es:'Ver en YouTube', ko:'유튜브에서 보기' },
  soon:   { en:'Videos coming soon — subscribe to catch them first!', es:'Pronto habrá videos — ¡suscríbete!', ko:'곧 영상이 올라옵니다 — 먼저 구독해두세요!' }
};
function L(k){ const v=L18[k]||{}; return v[KMR.getLang()] || v.en || k; }

document.getElementById('igBtn').href = 'https://instagram.com/' + IG_HANDLE;
document.getElementById('ytBtn').href = 'https://youtube.com/@' + YT_HANDLE;
function applyTexts(){
  document.title = L('title') + ' · ' + T('appName');
  document.getElementById('pageTitle').textContent = L('title');
  document.getElementById('pageSub').textContent   = L('sub');
  document.getElementById('igH').textContent = L('ig');
  document.getElementById('ytH').textContent = L('yt');
  document.getElementById('latestH').textContent = L('latest');
  document.getElementById('featH').textContent = L('featured');
  document.getElementById('showH').textContent = L('member');
}
applyTexts();

async function loadFeatured(){
  try {
    const r = await fetch(`${FB_DB}/rewards/featured.json?cache=${Date.now()}`, { cache:'no-store' });
    const d = (r.ok ? (await r.json()) : null) || {};
    const arr = Object.values(d).filter(x => x && x.link).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,8);
    if (!arr.length) return;
    document.getElementById('featured').innerHTML = arr.map(it => `
      <a class="feat-card" href="${escH(it.link)}" target="_blank" rel="noopener">
        ${it.image ? `<img class="fimg" src="${escH(it.image)}" alt="" loading="lazy">` : `<div class="fimg ph">📷</div>`}
        <div class="fcap">${escH(it.caption||'')}<br><span class="ig">${escH(L('viewIg'))} →</span></div>
      </a>`).join('');
    document.getElementById('featuredSec').style.display = '';
  } catch(_){}
}
loadFeatured();

const SHOW_EMO = { photo:'📸', post:'📝', video:'🎬', review:'⭐' };

// Member-shared, admin-approved posts (rewards/showcase). YouTube links play in-app;
// others open out. Record holds no phone number (publisher's first/display name only).
async function loadShowcase(){
  try {
    const r = await fetch(`${FB_DB}/rewards/showcase.json?cache=${Date.now()}`, { cache:'no-store' });
    const d = (r.ok ? (await r.json()) : null) || {};
    const arr = Object.values(d).filter(x => x && x.link).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,12);
    if (!arr.length) return;
    const el = document.getElementById('showcase');
    el.innerHTML = `<div class="vid-grid">${arr.map((it,i)=> it.yt ? `
      <div class="vid-card" data-yt="${escH(it.yt)}">
        <div style="position:relative"><img class="thumb" src="https://img.youtube.com/vi/${escH(it.yt)}/hqdefault.jpg" alt="" loading="lazy"><div class="play">▶</div></div>
        <div class="vt">${escH(it.name||'Member')} ${SHOW_EMO[it.platform]||'📣'}</div>
      </div>` : `
      <a class="vid-card" href="${escH(it.link)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">
        <div style="position:relative"><div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:2.4em;background:var(--surface-2,#f1f1f4)">${SHOW_EMO[it.platform]||'📣'}</div></div>
        <div class="vt">${escH(it.name||'Member')} · ${escH(L('viewPost'))} →</div>
      </a>`).join('')}</div>`;
    el.querySelectorAll('.vid-card[data-yt]').forEach(card => card.addEventListener('click', () => {
      const id = card.dataset.yt;
      const wrap = document.createElement('div');
      wrap.className = 'vid-embed';
      wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
      card.replaceWith(wrap);
    }));
    document.getElementById('showcaseSec').style.display = '';
  } catch(_){}
}
loadShowcase();

function escH(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function showFallback(){
  document.getElementById('videos').innerHTML =
    `<div class="fallback">${escH(L('soon'))}<br><br><a href="https://youtube.com/@${YT_HANDLE}" target="_blank" rel="noopener">▶ ${escH(L('watch'))} @${YT_HANDLE}</a></div>`;
}
function renderVideos(vids){
  if (!vids.length){ showFallback(); return; }
  const el = document.getElementById('videos');
  el.innerHTML = `<div class="vid-grid">${vids.map(v=>`
    <div class="vid-card" data-id="${escH(v.id)}">
      <div style="position:relative"><img class="thumb" src="${escH(v.thumb)}" alt="" loading="lazy"><div class="play">▶</div></div>
      <div class="vt">${escH(v.title)}</div>
    </div>`).join('')}</div>`;
  el.querySelectorAll('.vid-card').forEach(card => card.addEventListener('click', () => {
    const id = card.dataset.id;
    const wrap = document.createElement('div');
    wrap.className = 'vid-embed';
    wrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${encodeURIComponent(id)}?autoplay=1&rel=0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
    card.replaceWith(wrap);
  }));
}

async function loadVideos(){
  if (!YT_API_KEY){ showFallback(); return; }
  try {
    let uploads = YT_UPLOADS || localStorage.getItem('rewards.ytUploads');
    if (!uploads){
      const cr = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=contentDetails&forHandle=${encodeURIComponent(YT_HANDLE)}&key=${YT_API_KEY}`);
      const cd = await cr.json();
      uploads = cd && cd.items && cd.items[0] && cd.items[0].contentDetails && cd.items[0].contentDetails.relatedPlaylists && cd.items[0].contentDetails.relatedPlaylists.uploads;
      if (uploads) localStorage.setItem('rewards.ytUploads', uploads);
    }
    if (!uploads){ showFallback(); return; }
    const vr = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=${VIDEO_COUNT}&playlistId=${encodeURIComponent(uploads)}&key=${YT_API_KEY}`);
    const vd = await vr.json();
    const vids = ((vd && vd.items) || []).map(it => {
      const s = it.snippet || {};
      const th = s.thumbnails || {};
      return { id: s.resourceId && s.resourceId.videoId, title: s.title || '', thumb: (th.medium||th.high||th.default||{}).url || '' };
    }).filter(v => v.id && !/private|deleted/i.test(v.title));
    renderVideos(vids);
  } catch(e){ console.warn('[yt]', e); showFallback(); }
}
loadVideos();

window.addEventListener('rewards-lang-changed', () => location.reload());
KMR.registerSW();
</script>
</body>
</html>
