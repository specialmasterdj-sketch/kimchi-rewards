<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Account · KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.profile-card {
  background: linear-gradient(135deg, var(--km-green) 0%, var(--km-green-d) 100%);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 22px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.profile-card .avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6em; font-weight: 900;
  flex-shrink: 0;
}
.profile-card .info { flex: 1; min-width: 0; }
.profile-card .name { font-size: 1.2em; font-weight: 900; letter-spacing: -.02em; }
.profile-card .phone { font-size: .88em; opacity: .85; margin-top: 2px; }
.profile-card .badge {
  display: inline-block; font-size: .7em; font-weight: 800;
  background: rgba(255,255,255,.22);
  padding: 3px 10px; border-radius: 99px;
  margin-top: 6px; letter-spacing: .04em;
}

.tier-ladder { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.tier-step {
  text-align: center;
  padding: 12px 4px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  position: relative;
}
.tier-step .ic { font-size: 1.6em; }
.tier-step .nm { font-weight: 800; font-size: .76em; margin-top: 4px; }
.tier-step .req { font-size: .68em; color: var(--text-3); margin-top: 1px; }
.tier-step.current { border-color: var(--km-green); background: var(--km-green-l); box-shadow: 0 0 0 3px rgba(26,92,58,.1); }
.tier-step.current .nm { color: var(--km-green); }
.tier-step.passed { opacity: .6; }

.row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.row:last-child { border-bottom: 0; }
.row .lbl { font-size: .9em; color: var(--text-2); }
.row .val { font-size: .94em; font-weight: 700; color: var(--text); }

/* Perks list — current tier highlighted, locked perks shown muted */
.perk-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  font-size: .9em;
}
.perk-row:last-child { border-bottom: 0; }
.perk-row .pic {
  width: 32px; height: 32px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1em; flex-shrink: 0;
}
.perk-row.unlocked .pic { background: var(--km-green-l); color: var(--km-green); }
.perk-row.locked .pic { background: var(--surface-2); color: var(--text-3); opacity: .6; }
.perk-row.locked .lbl { color: var(--text-3); text-decoration: line-through; opacity: .55; }
.perk-row .lbl { flex: 1; line-height: 1.4; }

.perks-future {
  background: linear-gradient(135deg,#fef3c7,#fde68a);
  border-radius: var(--radius);
  padding: 14px 18px;
  font-size: .88em;
  color: #78350f;
}
.perks-future .ti { font-weight: 800; margin-bottom: 4px; }

.danger-btn {
  width: 100%;
  background: transparent; color: var(--danger);
  border: 1.5px solid #fecaca;
  border-radius: 12px;
  padding: 14px;
  font-family: inherit; font-weight: 800; font-size: .94em;
  cursor: pointer;
  transition: all .15s;
  margin-top: 10px;
}
.danger-btn:hover { background: #fef2f2; }
</style>
</head>
<body>
<div class="app">
  <header class="app-header" id="header"></header>

  <main class="app-main">
    <div>
      <h2 style="font-weight:900;letter-spacing:-.02em;font-size:1.4em" id="pageTitle"></h2>
    </div>

    <!-- Profile -->
    <div class="profile-card">
      <div class="avatar" id="avatar">?</div>
      <div class="info">
        <div class="name" id="profName">—</div>
        <div class="phone" id="profPhone">—</div>
        <span class="badge" id="profBadge">—</span>
      </div>
    </div>

    <!-- Tier ladder -->
    <div class="sec-title" id="lblTier"></div>
    <div class="tier-ladder">
      <div class="tier-step" data-tier="bronze">
        <div class="ic">🥉</div><div class="nm" id="nmBronze"></div><div class="req">$0+</div>
      </div>
      <div class="tier-step" data-tier="silver">
        <div class="ic">🥈</div><div class="nm" id="nmSilver"></div><div class="req">$100+</div>
      </div>
      <div class="tier-step" data-tier="gold">
        <div class="ic">🏆</div><div class="nm" id="nmGold"></div><div class="req">$500+</div>
      </div>
      <div class="tier-step" data-tier="diamond">
        <div class="ic">💎</div><div class="nm" id="nmDiamond"></div><div class="req">$1000+</div>
      </div>
    </div>

    <!-- Perks for current tier -->
    <div class="sec-title" id="lblPerks"></div>
    <div class="card" style="padding:6px 18px">
      <div id="perksList"></div>
    </div>

    <!-- Next-tier perks (locked) — only if not at top tier -->
    <div id="nextTierBlock" style="display:none">
      <div class="sec-title" id="lblNextTier"></div>
      <div class="card" style="padding:6px 18px">
        <div id="nextTierList"></div>
      </div>
    </div>

    <!-- Stats card -->
    <div class="card" style="padding:6px 18px">
      <div class="row">
        <span class="lbl" id="lblSpent30"></span>
        <span class="val" id="valSpent30">$0.00</span>
      </div>
      <div class="row">
        <span class="lbl" id="lblSpentLT"></span>
        <span class="val" id="valSpentLT">$0.00</span>
      </div>
      <div class="row">
        <span class="lbl" id="lblPointsVela"></span>
        <span class="val" id="valPointsVela">0</span>
      </div>
      <div class="row" id="rowBonus" style="display:none">
        <span class="lbl" id="lblPointsBonus" style="color:#b45309"></span>
        <span class="val" id="valPointsBonus" style="color:#b45309">0</span>
      </div>
      <div class="row" id="rowTotal" style="display:none">
        <span class="lbl" id="lblPointsTotal" style="font-weight:800"></span>
        <span class="val" id="valPointsTotal" style="font-weight:900;color:var(--km-green-d)">0</span>
      </div>
      <div class="row">
        <span class="lbl" id="lblStore"></span>
        <span class="val" id="valStore">—</span>
      </div>
      <div class="row">
        <span class="lbl" id="lblJoined"></span>
        <span class="val" id="valJoined">—</span>
      </div>
      <div class="row">
        <span class="lbl" id="lblBirth"></span>
        <span class="val" id="valBirth">—</span>
      </div>
    </div>

    <!-- Settings -->
    <div class="sec-title" id="lblSettings"></div>
    <div class="card" style="padding:6px 18px">
      <div class="row">
        <span class="lbl" id="lblLang"></span>
        <div class="lang-bar" id="langBarBottom" style="background:transparent"></div>
      </div>
    </div>

    <button class="danger-btn" id="btnLogout"></button>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script src="./app.js"></script>
<script>
const T = KMR.t.bind(KMR);
const me = KMR.requireAuth();
if (!me) {}

KMR.renderHeader(document.getElementById('header'));
KMR.renderTabBar(document.getElementById('tabbar'), 'account');
KMR.renderLangBar(document.getElementById('langBarBottom'));

function applyTexts() {
  document.title = T('accountTitle') + ' · ' + T('appName');
  document.getElementById('pageTitle').textContent = T('accountTitle');
  document.getElementById('lblTier').textContent = T('accountTier').toUpperCase();
  document.getElementById('lblSettings').textContent = T('accountSettings').toUpperCase();
  document.getElementById('lblLang').textContent = T('accountLang');
  document.getElementById('lblSpent30').textContent = T('accountSpent30');
  document.getElementById('lblSpentLT').textContent = T('accountSpentLT');
  document.getElementById('lblPointsVela').textContent  = T('pointsVela');
  document.getElementById('lblPointsBonus').textContent = T('pointsBonus');
  document.getElementById('lblPointsTotal').textContent = T('pointsTotal');
  document.getElementById('lblStore').textContent = T('accountStore');
  document.getElementById('lblJoined').textContent = T('accountJoined');
  document.getElementById('lblBirth').textContent = T('birthDate');
  document.getElementById('lblPerks').textContent = T('perksTitle').toUpperCase();
  document.getElementById('btnLogout').textContent = T('logout');
  document.getElementById('nmBronze').textContent = T('tierBronze');
  document.getElementById('nmSilver').textContent = T('tierSilver');
  document.getElementById('nmGold').textContent = T('tierGold');
  document.getElementById('nmDiamond').textContent = T('tierDiamond');
}
applyTexts();

document.getElementById('btnLogout').addEventListener('click', () => {
  if (confirm(T('logout') + '?')) KMR.logout();
});

function fmtMoney(n) { return '$' + (Math.round((+n||0)*100)/100).toFixed(2); }

async function loadData() {
  const c = await KMR.fetchCustomer(me.phone);
  if (!c) return;

  document.getElementById('profName').textContent = c.name || '—';
  document.getElementById('profPhone').textContent = KMR.fmtPhone(me.phone);
  document.getElementById('avatar').textContent = (c.name || '?').slice(0,1).toUpperCase();

  const tier = KMR.calcTier(c.totalSpent_30d || 0);
  document.getElementById('profBadge').textContent = tier.emoji + ' ' + tier.name + ' ' + T('tierMember');

  // Highlight current tier in ladder
  const order = ['bronze','silver','gold','diamond'];
  const curIdx = order.indexOf(tier.key);
  document.querySelectorAll('.tier-step').forEach(el => {
    const k = el.dataset.tier;
    const idx = order.indexOf(k);
    el.classList.toggle('current', idx === curIdx);
    el.classList.toggle('passed', idx < curIdx);
  });

  document.getElementById('valSpent30').textContent = fmtMoney(c.totalSpent_30d);
  document.getElementById('valSpentLT').textContent = fmtMoney(c.totalSpent_lifetime);

  // Two-balance display (Vela + bonus + total). Total/bonus rows only when bonus > 0.
  const vela  = Number(c.points) || 0;
  const bonus = Number(c.bonusPoints) || 0;
  document.getElementById('valPointsVela').textContent = vela.toLocaleString();
  if (bonus > 0) {
    document.getElementById('rowBonus').style.display = '';
    document.getElementById('rowTotal').style.display = '';
    document.getElementById('valPointsBonus').textContent = '+' + bonus.toLocaleString();
    document.getElementById('valPointsTotal').textContent = (vela + bonus).toLocaleString();
  }

  const branchObj = BRANCHES.find(b => b.id === c.branch);
  document.getElementById('valStore').textContent = branchObj ? branchObj.name : (c.branch || '—');

  if (c.joinedAt) {
    const d = new Date(c.joinedAt);
    const lang = KMR.getLang();
    const localeMap = { en:'en-US', es:'es-ES', ru:'ru-RU', zh:'zh-CN', ko:'ko-KR' };
    document.getElementById('valJoined').textContent = d.toLocaleDateString(localeMap[lang]||'en-US', { year:'numeric', month:'short', day:'numeric' });
  }
  // Birthday display — year + month + day (year optional for older accounts)
  if (c.birthMonth) {
    const months = KMR.tArr('months');
    const monthName = months[c.birthMonth - 1] || '';
    const dayStr = c.birthDay ? ' ' + c.birthDay : '';
    const yearStr = c.birthYear ? ', ' + c.birthYear : '';
    document.getElementById('valBirth').textContent = monthName + dayStr + yearStr + ' 🎂';
  }

  // Tier perks — current vs next-tier locked
  renderPerks(tier);
}

function perkIcon(key) {
  switch (key) {
    case 'perk_pts1pct':      return '⭐';
    case 'perk_birthday200':
    case 'perk_birthday500':
    case 'perk_birthday1000': return '🎂';
    case 'perk_dealsEarly':   return '⚡';
    case 'perk_freeDelivery': return '🚚';
    case 'perk_newProducts':  return '✨';
    default: return '🎁';
  }
}

function renderPerks(tier) {
  const order = ['bronze','silver','gold','diamond'];
  const curIdx = order.indexOf(tier.key);
  const myPerks = KMR.tierPerks(tier.key);
  // Current tier perks — all unlocked
  document.getElementById('perksList').innerHTML = myPerks.map(k => `
    <div class="perk-row unlocked">
      <div class="pic">${perkIcon(k)}</div>
      <div class="lbl">${T(k)}</div>
    </div>
  `).join('');

  // Next-tier exclusives (locked)
  if (curIdx < order.length - 1) {
    const nextKey = order[curIdx + 1];
    const nextPerks = KMR.tierPerks(nextKey);
    const nextName = nextKey === 'silver' ? T('tierSilver') : nextKey === 'gold' ? T('tierGold') : T('tierDiamond');
    // Only the perks the user doesn't already have
    const newOnes = nextPerks.filter(p => !myPerks.includes(p));
    if (newOnes.length) {
      document.getElementById('nextTierBlock').style.display = '';
      document.getElementById('lblNextTier').textContent = T('perksNextTier', { next: nextName }).toUpperCase();
      document.getElementById('nextTierList').innerHTML = newOnes.map(k => `
        <div class="perk-row locked">
          <div class="pic">🔒</div>
          <div class="lbl">${T(k)}</div>
        </div>
      `).join('');
    }
  }
}
loadData();

window.addEventListener('rewards-lang-changed', () => location.reload());
KMR.registerSW();
</script>
</body>
</html>
