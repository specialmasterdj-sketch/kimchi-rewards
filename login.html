<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./pwa-assets/apple-touch-icon.png">
<link rel="stylesheet" href="./style.css">
<style>
/* Hero carousel — premium auto-fade between store photos */
.hero-carousel {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 8px 28px rgba(0,0,0,.14);
  background: #1a1a1a;
}
.hero-slide {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
}
.hero-slide.active { opacity: 1; }
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.05) 0%, rgba(0,0,0,.0) 30%, rgba(0,0,0,.55) 100%);
  display: flex;
  align-items: flex-end;
  padding: 22px;
  z-index: 2;
}
.hero-overlay .content {
  color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,.5);
}
.hero-overlay .ti {
  font-size: 1.05em;
  font-weight: 800;
  letter-spacing: -.01em;
  line-height: 1.3;
}
.hero-overlay .meta {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 6px;
  font-size: .82em;
  font-weight: 600;
  opacity: .92;
}
.hero-overlay .star {
  display: inline-flex; align-items: center; gap: 3px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 3px 9px;
  border-radius: 99px;
  font-weight: 700;
}
.hero-dots {
  position: absolute;
  bottom: 14px; right: 18px;
  display: flex; gap: 5px;
  z-index: 3;
}
.hero-dots span {
  width: 6px; height: 6px;
  border-radius: 99px;
  background: rgba(255,255,255,.5);
  transition: all .3s;
}
.hero-dots span.active {
  width: 16px;
  background: #fff;
}

/* Brand strip — rotating partner logos as text */
.brands-strip {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 0;
  margin-bottom: 18px;
  overflow: hidden;
}
.brands-strip .label {
  text-align: center;
  font-size: .68em;
  font-weight: 800;
  letter-spacing: .14em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.brands-track {
  display: flex;
  gap: 36px;
  animation: brandsScroll 24s linear infinite;
  width: max-content;
  padding: 0 8px;
}
.brands-track .brand-item {
  font-weight: 800;
  font-size: 1.05em;
  color: var(--text);
  letter-spacing: -.01em;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 6px;
  opacity: .85;
}
.brands-track .brand-item .dot {
  display: inline-block;
  width: 4px; height: 4px;
  background: var(--km-green);
  border-radius: 99px;
  margin-right: 4px;
  opacity: .5;
}
@keyframes brandsScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@media (prefers-reduced-motion: reduce) {
  .brands-track { animation: none; }
  .hero-slide { transition: none; }
}
</style>
</head>
<body>
<div class="app">
  <div class="app-main" style="padding-top:14px">
    <!-- Hero carousel — store photos rotating with overlay text -->
    <div class="hero-carousel" id="heroCarousel">
      <div class="hero-slide active" style="background-image:url('./pwa-assets/store/exterior.jpg')" data-slide="exterior"></div>
      <div class="hero-slide"        style="background-image:url('./pwa-assets/store/sushi-king.jpg')" data-slide="sushi-king"></div>
      <div class="hero-slide"        style="background-image:url('./pwa-assets/store/seafood.jpg')" data-slide="seafood"></div>
      <div class="hero-slide"        style="background-image:url('./pwa-assets/store/produce.jpg')" data-slide="produce"></div>
      <div class="hero-slide"        style="background-image:url('./pwa-assets/store/k-sides.jpg')" data-slide="k-sides"></div>
      <div class="hero-overlay">
        <div class="content">
          <div class="ti" id="heroTagline">Fresh Asian food at the Best Price in FL</div>
          <div class="meta">
            <span class="star">⭐ 4.7 · 241 reviews</span>
            <span id="heroOpen">Open 365 days</span>
          </div>
        </div>
      </div>
      <div class="hero-dots" id="heroDots"></div>
    </div>

    <!-- Partner brand strip -->
    <div class="brands-strip">
      <div class="label" id="brandsLabel">Trusted by Korea's top brands</div>
      <div class="brands-track">
        <span class="brand-item"><span class="dot"></span>CJ FOODS</span>
        <span class="brand-item"><span class="dot"></span>bb.q CHICKEN</span>
        <span class="brand-item"><span class="dot"></span>얌샘김밥</span>
        <span class="brand-item"><span class="dot"></span>SUSHI KING</span>
        <span class="brand-item"><span class="dot"></span>SAMYANG</span>
        <span class="brand-item"><span class="dot"></span>K-SIDES</span>
        <!-- duplicate for seamless loop -->
        <span class="brand-item"><span class="dot"></span>CJ FOODS</span>
        <span class="brand-item"><span class="dot"></span>bb.q CHICKEN</span>
        <span class="brand-item"><span class="dot"></span>얌샘김밥</span>
        <span class="brand-item"><span class="dot"></span>SUSHI KING</span>
        <span class="brand-item"><span class="dot"></span>SAMYANG</span>
        <span class="brand-item"><span class="dot"></span>K-SIDES</span>
      </div>
    </div>

    <!-- Splash header -->
    <div class="splash" style="min-height:auto;padding:0 0 22px">
      <h1><span class="green">KIMCHI MART</span></h1>
      <p id="tagline" style="margin:6px 0 0">Your points. Your perks.</p>
    </div>

    <!-- Lang switcher -->
    <div style="display:flex;justify-content:center;margin:0 0 18px">
      <div class="lang-bar" id="langBar"></div>
    </div>

    <!-- Form card -->
    <div class="form-card">
      <!-- Toggle -->
      <div class="toggle-row" id="toggleRow">
        <button id="tabIn" class="active" type="button" data-mode="in"></button>
        <button id="tabUp" type="button" data-mode="up"></button>
      </div>

      <!-- Title -->
      <h2 class="form-title" id="formTitle"></h2>
      <p class="form-sub" id="formSub"></p>

      <!-- Alert area -->
      <div id="alert"></div>

      <!-- Phone -->
      <div class="field">
        <label id="lblPhone"></label>
        <input id="inPhone" type="tel" inputmode="tel" autocomplete="tel-national" placeholder="(305) 555-1234" maxlength="14">
        <div class="hint" id="hintPhone"></div>
      </div>

      <!-- PIN -->
      <div class="field">
        <label id="lblPin"></label>
        <input id="inPin" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="4" pattern="\d{4}">
        <div class="hint" id="hintPin"></div>
      </div>

      <!-- Sign-up only fields -->
      <div id="signupFields" style="display:none">
        <div class="field">
          <label id="lblPinConfirm"></label>
          <input id="inPinConfirm" type="password" inputmode="numeric" maxlength="4" pattern="\d{4}">
        </div>
        <div class="field">
          <label id="lblName"></label>
          <input id="inName" type="text" autocomplete="name" placeholder="Maria">
        </div>
        <div class="field">
          <label id="lblBirth"></label>
          <div style="display:flex;gap:8px">
            <select id="inBirthMonth" style="flex:1.4"></select>
            <select id="inBirthDay" style="flex:1"></select>
          </div>
          <div class="hint" id="hintBirth"></div>
        </div>
        <div class="field">
          <label id="lblBranch"></label>
          <select id="inBranch"></select>
        </div>
        <div class="field">
          <label id="lblRef"></label>
          <input id="inRef" type="text" maxlength="6" style="text-transform:uppercase" placeholder="ABC123">
        </div>
      </div>

      <!-- Submit -->
      <button class="btn" id="btnSubmit" type="button"></button>
    </div>
  </div>
</div>

<script src="./app.js"></script>
<script>
const T = KMR.t.bind(KMR);
let MODE = 'in';   // 'in' | 'up'
const params = new URLSearchParams(location.search);
const RETURN_TO = params.get('returnTo') || 'index.html';
const PREFILL_REF = (params.get('ref') || '').toUpperCase().slice(0, 6);   // QR-share auto-fills referral code
const PREFILL_STORE = (params.get('store') || '').toUpperCase();           // store-poster QR pre-selects branch
const SIGNUP_SOURCE = params.get('src') || '';                              // marketing-source tag (qr / sms / refer / ...)

// === Already signed in? Skip ===
(function(){
  const me = KMR.getMe();
  if (me && me.phone) location.replace('./' + RETURN_TO.replace(/^\.?\//,''));
})();

// === Hero carousel auto-slide ===
(function () {
  const slides = document.querySelectorAll('.hero-carousel .hero-slide');
  const dotsHost = document.getElementById('heroDots');
  if (!slides.length || !dotsHost) return;
  // Build dots
  dotsHost.innerHTML = Array.from(slides, (_, i) => `<span class="${i===0?'active':''}"></span>`).join('');
  const dots = dotsHost.querySelectorAll('span');
  let idx = 0;
  function go(n) {
    slides[idx].classList.remove('active');
    dots[idx].classList.remove('active');
    idx = (n + slides.length) % slides.length;
    slides[idx].classList.add('active');
    dots[idx].classList.add('active');
  }
  setInterval(() => go(idx + 1), 4500);
})();

// === Render lang bar ===
KMR.renderLangBar(document.getElementById('langBar'));

// === Apply translations to static labels ===
function applyTexts(){
  document.title = T('appName');
  document.getElementById('tagline').textContent = T('tagline');
  // Hero + brands
  const heroT = document.getElementById('heroTagline');
  if (heroT) heroT.textContent = T('heroTagline');
  const heroO = document.getElementById('heroOpen');
  if (heroO) heroO.textContent = '⏰ ' + T('heroOpen');
  const brandsL = document.getElementById('brandsLabel');
  if (brandsL) brandsL.textContent = T('brandsLabel');
  document.getElementById('tabIn').textContent = T('signIn');
  document.getElementById('tabUp').textContent = T('signUp');
  document.getElementById('lblPhone').textContent = T('phone');
  document.getElementById('hintPhone').textContent = T('phoneHint');
  document.getElementById('lblName').textContent = T('name');
  document.getElementById('lblBirth').textContent = T('birthDate');
  document.getElementById('hintBirth').textContent = T('birthHint');
  document.getElementById('lblBranch').textContent = T('branch');
  document.getElementById('lblRef').textContent = T('referralOpt');
  // PIN labels depend on mode
  document.getElementById('lblPin').textContent = (MODE === 'up') ? T('pinSet') : T('pin');
  document.getElementById('lblPinConfirm').textContent = T('pinConfirm');
  document.getElementById('hintPin').textContent = (MODE === 'in') ? T('pinHintFirst') : '';
  // Title / button
  document.getElementById('formTitle').textContent = (MODE === 'up') ? T('welcomeNew') : T('welcome');
  document.getElementById('formSub').textContent = T('tagline');
  document.getElementById('btnSubmit').textContent = (MODE === 'up') ? T('create') : T('signIn');

  // Birth month + day dropdowns
  const monthSel = document.getElementById('inBirthMonth');
  const daySel = document.getElementById('inBirthDay');
  const months = KMR.tArr('months');
  const monthLabel = T('birthMonth');
  const dayLabel = T('birthDay');
  monthSel.innerHTML = `<option value="">${monthLabel}</option>` + months.map((m,i) => `<option value="${i+1}">${m}</option>`).join('');
  // Days 1-31 (clamped per month on change)
  function fillDays(maxDay){
    const cur = daySel.value;
    let html = `<option value="">${dayLabel}</option>`;
    for (let i = 1; i <= maxDay; i++) html += `<option value="${i}">${i}</option>`;
    daySel.innerHTML = html;
    if (cur && parseInt(cur,10) <= maxDay) daySel.value = cur;
  }
  fillDays(31);
  monthSel.addEventListener('change', () => {
    const m = parseInt(monthSel.value || '0', 10);
    if (!m) { fillDays(31); return; }
    // Days per month — non-leap-year safe (allow 29 Feb)
    const dim = [31,29,31,30,31,30,31,31,30,31,30,31];
    fillDays(dim[m-1]);
  });

  // Branch dropdown
  const branchSel = document.getElementById('inBranch');
  branchSel.innerHTML = `<option value="">—</option>` + BRANCHES.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
}
applyTexts();

// === Phone format mask ===
const inPhone = document.getElementById('inPhone');
inPhone.addEventListener('input', () => {
  const d = KMR.digitsOnly(inPhone.value).slice(0,10);
  if (d.length <= 3) inPhone.value = d;
  else if (d.length <= 6) inPhone.value = `(${d.slice(0,3)}) ${d.slice(3)}`;
  else inPhone.value = `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
});

// === Mode toggle ===
function setMode(m){
  MODE = m;
  document.getElementById('tabIn').classList.toggle('active', m==='in');
  document.getElementById('tabUp').classList.toggle('active', m==='up');
  document.getElementById('signupFields').style.display = (m==='up') ? '' : 'none';
  applyTexts();
  // Auto-fill referral code on first switch to Sign Up if QR-share param present
  if (m === 'up' && PREFILL_REF && /^[A-Z0-9]{6}$/.test(PREFILL_REF)) {
    const ref = document.getElementById('inRef');
    if (ref && !ref.value) ref.value = PREFILL_REF;
  }
  // Auto-pick the branch when the customer scanned a store-poster QR
  if (m === 'up' && PREFILL_STORE) {
    const br = document.getElementById('inBranch');
    if (br && !br.value) {
      // Make sure the option exists, then select it
      for (const opt of br.options) { if (opt.value === PREFILL_STORE) { br.value = PREFILL_STORE; break; } }
    }
  }
}
document.getElementById('tabIn').addEventListener('click', () => setMode('in'));
document.getElementById('tabUp').addEventListener('click', () => setMode('up'));

// QR-share or store poster → jump to Sign Up so the customer's path is shortest
if ((PREFILL_REF && /^[A-Z0-9]{6}$/.test(PREFILL_REF)) || PREFILL_STORE) {
  setMode('up');
}

// === Alert ===
function showAlert(type, msg){
  const el = document.getElementById('alert');
  el.innerHTML = `<div class="alert ${type}">${msg}</div>`;
  if (type === 'success') setTimeout(() => el.innerHTML = '', 2500);
}

// === Submit ===
const btn = document.getElementById('btnSubmit');
btn.addEventListener('click', async () => {
  document.getElementById('alert').innerHTML = '';
  const phoneRaw = inPhone.value;
  const e164 = KMR.normPhone(phoneRaw);
  if (!e164) return showAlert('error', T('errInvalidPhone'));
  const pin = document.getElementById('inPin').value.trim();

  btn.disabled = true;
  try {
    const existing = await KMR.fetchCustomer(e164);

    if (MODE === 'in') {
      if (!existing) return showAlert('error', T('errNotFound'));
      // Pre-imported (no pinHash yet) — guide them to Sign Up tab to set up PIN
      // (PIN field is allowed to be empty in this case — they don't have one yet)
      if (!existing.pinHash) {
        const ptsMsg = (existing.points && existing.points > 0)
          ? ' ' + T('pointsAlready', { n: (existing.points||0).toLocaleString() })
          : '';
        showAlert('success', T('welcomeBack') + ptsMsg);
        // Auto-switch to Sign Up tab and pre-fill name/birthday from imported record
        setTimeout(() => {
          setMode('up');
          if (existing.name) document.getElementById('inName').value = existing.name;
          if (existing.birthMonth) {
            document.getElementById('inBirthMonth').value = String(existing.birthMonth);
            document.getElementById('inBirthMonth').dispatchEvent(new Event('change'));
          }
          if (existing.birthDay) document.getElementById('inBirthDay').value = String(existing.birthDay);
          if (existing.branch) document.getElementById('inBranch').value = existing.branch;
          // Sub-text on form to make the welcome explicit
          document.getElementById('formSub').textContent = T('welcomeBackSub');
        }, 600);
        return;
      }
      // Has pinHash → need a 4-digit PIN to verify
      if (!/^\d{4}$/.test(pin)) return showAlert('error', T('errPin'));
      const h = await KMR.hashPin(pin, e164);
      if (existing.pinHash !== h) return showAlert('error', T('errWrongPin'));
      // OK
      await KMR.saveCustomer(e164, { lastVisit: Date.now() });
      KMR.setMe({ phone: e164, name: existing.name || '', branch: existing.branch || '' });
      location.replace('./' + RETURN_TO.replace(/^\.?\//,''));
      return;
    }

    // === SIGN UP ===
    // From here on, PIN is required (must be 4 digits)
    if (!/^\d{4}$/.test(pin)) return showAlert('error', T('errPin'));
    // Pre-imported (from Vela POS) — record exists but no pinHash yet.
    // Treat as "activate existing account": keep their points/name, just set PIN.
    const isPreImported = !!(existing && !existing.pinHash);
    if (existing && !isPreImported) return showAlert('error', T('errExists'));

    const pin2 = document.getElementById('inPinConfirm').value.trim();
    if (pin !== pin2) return showAlert('error', T('errPinMismatch'));

    const name = (document.getElementById('inName').value || '').trim();
    const birthMonth = parseInt(document.getElementById('inBirthMonth').value || '0', 10) || 0;
    const birthDay   = parseInt(document.getElementById('inBirthDay').value || '0', 10) || 0;
    const branch = document.getElementById('inBranch').value || '';
    const refCodeInput = (document.getElementById('inRef').value || '').trim().toUpperCase();

    let referredByPhone = null;
    if (refCodeInput) {
      referredByPhone = await KMR.fetchByReferral(refCodeInput);
      if (!referredByPhone) return showAlert('error', T('errReferral'));
    }

    // Generate own referral code (retry on collision)
    let myCode = '';
    for (let i = 0; i < 5; i++) {
      const c = KMR.genReferralCode();
      const taken = await KMR.fetchByReferral(c);
      if (!taken) { myCode = c; break; }
    }
    if (!myCode) myCode = KMR.genReferralCode() + Date.now().toString(36).slice(-2).toUpperCase();

    const pinHash = await KMR.hashPin(pin, e164);

    let newCustomer;
    if (isPreImported) {
      // Keep existing data (points, name, totalSpent, etc.) — just add what's new.
      newCustomer = Object.assign({}, existing, {
        pinHash,
        // Only overwrite optional fields if user provided new values
        name:        name || existing.name || 'Member',
        birthMonth:  birthMonth || existing.birthMonth || 0,
        birthDay:    birthDay   || existing.birthDay   || 0,
        branch:      branch     || existing.branch     || '',
        referralCode: existing.referralCode || myCode,
        // Bonus +500 if used referral, on top of existing points
        points: (existing.points || 0) + (referredByPhone ? 500 : 0),
        referredBy: existing.referredBy || referredByPhone || null,
        lastVisit: Date.now(),
        activatedAt: Date.now()
      });
      await KMR.setCustomer(e164, newCustomer);
      // Ensure referral code lookup is set
      if (!existing.referralCode) await KMR.setReferralCode(myCode, e164);
    } else {
      newCustomer = {
        phone: e164,
        name: name || 'Member',
        pinHash,
        points: referredByPhone ? 500 : 0,
        tier: 'bronze',
        joinedAt: Date.now(),
        birthMonth,
        birthDay,
        branch,
        referralCode: myCode,
        referredBy: referredByPhone || null,
        signupSource: SIGNUP_SOURCE || 'direct',
        lastVisit: Date.now(),
        totalSpent_30d: 0,
        totalSpent_lifetime: 0
      };
      await KMR.setCustomer(e164, newCustomer);
      await KMR.setReferralCode(myCode, e164);
    }

    // Reward referrer (+500)
    if (referredByPhone) {
      try {
        const refRaw = await fetch(`${FB_DB}/rewards/customers/${referredByPhone}.json`);
        const refData = await refRaw.json();
        if (refData) {
          await fetch(`${FB_DB}/rewards/customers/${referredByPhone}.json`, {
            method:'PATCH',
            body: JSON.stringify({ points: (refData.points||0) + 500 })
          });
        }
      } catch(e){}
    }

    KMR.setMe({ phone: e164, name: newCustomer.name, branch });
    location.replace('./index.html');

  } catch(err) {
    console.error(err);
    showAlert('error', String(err && err.message || err));
  } finally {
    btn.disabled = false;
  }
});

// === Re-render on lang change ===
window.addEventListener('rewards-lang-changed', () => {
  applyTexts();
});

// === Register SW ===
KMR.registerSW();
</script>
</body>
</html>
