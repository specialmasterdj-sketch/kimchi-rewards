<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<title>K1 / K2 Membership · KIMCHI MART REWARDS</title>

<style>
.hero-banner {
  background: linear-gradient(135deg,#c1272d 0%,#8b1a1f 100%);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 24px 22px;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.hero-banner::before {
  content: '';
  position: absolute; inset: -50% -50% auto auto;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,.15), transparent 60%);
}
.hero-banner .ti { font-weight: 900; font-size: 1.4em; letter-spacing: -.02em; position: relative; }
.hero-banner .sub { font-size: .92em; opacity: .9; margin-top: 6px; position: relative; }

.plan-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 22px 22px 18px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.plan-card .accent-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
}
.plan-card.k1 .accent-bar { background: linear-gradient(90deg,#1a5c3a,#22c55e); }
.plan-card.k2 .accent-bar { background: linear-gradient(90deg,#1e40af,#3b82f6); }
.plan-card .row { display: flex; align-items: center; gap: 12px; }
.plan-card .badge {
  width: 56px; height: 56px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 1.4em; color: #fff;
  flex-shrink: 0;
}
.plan-card.k1 .badge { background: linear-gradient(135deg,#1a5c3a,#22c55e); }
.plan-card.k2 .badge { background: linear-gradient(135deg,#1e40af,#3b82f6); }
.plan-card .nm { font-weight: 900; font-size: 1.2em; letter-spacing: -.01em; }
.plan-card .who { font-size: .85em; color: var(--text-3); margin-top: 2px; }
.plan-card .price-row {
  display: flex; align-items: baseline; gap: 10px;
  margin-top: 14px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.plan-card .price { font-weight: 900; font-size: 1.6em; letter-spacing: -.02em; }
.plan-card.k1 .price { color: var(--km-green); }
.plan-card.k2 .price { color: #1e40af; }
.plan-card .price-unit { font-size: .82em; color: var(--text-3); }
.plan-card .perk {
  display: inline-block;
  font-size: .82em; font-weight: 800;
  padding: 4px 10px; border-radius: 99px;
  margin-top: 8px; letter-spacing: .02em;
}
.plan-card.k1 .perk { background: var(--km-green-l); color: var(--km-green-d); }
.plan-card.k2 .perk { background: #dbeafe; color: #1e40af; }
.plan-card .note {
  font-size: .82em; color: var(--text-2);
  margin-top: 12px; line-height: 1.4;
  padding: 10px 12px;
  background: var(--surface-2);
  border-radius: 8px;
  border-left: 3px solid var(--border);
}

.section-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 18px 20px;
}
.section-card h3 {
  font-weight: 800; font-size: 1.02em;
  letter-spacing: -.01em;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.rules-list {
  list-style: none; padding: 0; margin: 0;
}
.rules-list li {
  font-size: .88em;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 10px;
  color: var(--text-2);
  line-height: 1.45;
}
.rules-list li:last-child { border-bottom: 0; padding-bottom: 4px; }
.rules-list li::before {
  content: '✓';
  color: var(--km-green);
  font-weight: 900;
  flex-shrink: 0;
  font-size: .96em;
  margin-top: 1px;
}

.cta-card {
  background: linear-gradient(135deg, var(--km-green) 0%, var(--km-green-d) 100%);
  color: #fff;
  border-radius: var(--radius);
  padding: 18px 20px;
  text-align: center;
}
.cta-card .ti { font-weight: 900; font-size: 1.05em; }
.cta-card .sub { font-size: .85em; opacity: .9; margin-top: 4px; line-height: 1.4; }

.compare-table {
  width: 100%; border-collapse: collapse;
  font-size: .88em;
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}
.compare-table th, .compare-table td {
  padding: 10px 12px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.compare-table th {
  background: var(--surface-2);
  font-weight: 800; font-size: .82em;
  text-transform: uppercase; letter-spacing: .04em;
  color: var(--text-3);
}
.compare-table tr:last-child td { border-bottom: 0; }
.compare-table .highlight { color: var(--km-green); font-weight: 800; }

/* ============== Store directory — premium card design ============== */
.stores-tagline {
  position: relative;
  background: linear-gradient(135deg, #1a5c3a 0%, #0f3d24 100%);
  color: #fff;
  border-radius: 18px;
  padding: 22px 24px;
  margin-bottom: 14px;
  text-align: center;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(15,61,36,.18);
}
.stores-tagline::before {
  content: '';
  position: absolute; top: -60%; right: -30%;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255,255,255,.12), transparent 65%);
  pointer-events: none;
}
.stores-tagline::after {
  content: '';
  position: absolute; bottom: -40%; left: -20%;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(193,39,45,.18), transparent 65%);
  pointer-events: none;
}
.stores-tagline .ti {
  position: relative;
  font-weight: 800; font-size: 1.04em;
  letter-spacing: -.01em;
}
.stores-tagline .meta {
  position: relative;
  font-size: .82em; opacity: .85;
  margin-top: 4px;
  letter-spacing: .01em;
}

.store-card {
  position: relative;
  background: linear-gradient(180deg, #fff 0%, #fafaf7 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 14px;
  transition: all .25s cubic-bezier(.2,.8,.2,1);
  overflow: hidden;
}
.store-card::before {
  content: '';
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, var(--km-green), var(--km-green-d));
  transform: scaleY(0);
  transform-origin: top center;
  transition: transform .3s cubic-bezier(.2,.8,.2,1);
}
.store-card:hover {
  border-color: var(--km-green);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(26,92,58,.10);
}
.store-card:hover::before { transform: scaleY(1); }
.store-card.coming { opacity: .72; }
.store-card.coming::before { background: linear-gradient(180deg, #d97706, #b45309); }

.store-pin {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #1a5c3a 0%, #2e7d32 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4em;
  box-shadow: 0 4px 12px rgba(26,92,58,.28), inset 0 1px 0 rgba(255,255,255,.15);
  flex-shrink: 0;
}
.store-card.coming .store-pin {
  background: linear-gradient(135deg, #d97706, #b45309);
  box-shadow: 0 4px 12px rgba(217,119,6,.24), inset 0 1px 0 rgba(255,255,255,.15);
}

.store-content { min-width: 0; }
.store-head {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.store-name {
  font-weight: 900; font-size: 1.06em;
  letter-spacing: -.02em;
  color: var(--text);
}
.store-badge {
  font-size: .64em; font-weight: 800;
  padding: 3px 9px;
  border-radius: 99px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.store-badge.new {
  background: linear-gradient(135deg, #dcfce7, #86efac);
  color: #14532d;
  box-shadow: 0 1px 2px rgba(20,83,45,.15);
}
.store-badge.coming {
  background: linear-gradient(135deg, #fef3c7, #fcd34d);
  color: #78350f;
  box-shadow: 0 1px 2px rgba(120,53,15,.15);
}
.store-addr {
  font-size: .86em;
  color: var(--text-2);
  line-height: 1.5;
  letter-spacing: -.005em;
}

.store-actions {
  display: flex; gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.store-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border-radius: 99px;
  font-family: inherit;
  font-size: .82em; font-weight: 700;
  text-decoration: none;
  transition: all .2s cubic-bezier(.2,.8,.2,1);
  letter-spacing: -.005em;
  white-space: nowrap;
}
.store-btn.primary {
  background: var(--km-green);
  color: #fff;
  box-shadow: 0 2px 6px rgba(26,92,58,.25);
}
.store-btn.primary:hover {
  background: var(--km-green-d);
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(26,92,58,.32);
}
.store-btn.ghost {
  background: transparent;
  color: var(--km-green-d);
  border: 1px solid var(--border);
}
.store-btn.ghost:hover {
  border-color: var(--km-green);
  background: var(--km-green-l);
  transform: translateY(-1px);
}
.store-btn .arrow {
  transition: transform .2s;
  font-size: .92em;
}
.store-btn.primary:hover .arrow { transform: translateX(2px); }

/* Active membership banner (if user already has K1/K2/trial) */
.your-status {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1px solid #fcd34d;
  border-radius: var(--radius);
  padding: 14px 18px;
  display: flex; align-items: center; gap: 12px;
}
.your-status .ic { font-size: 1.6em; }
.your-status .ti { font-weight: 800; color: #78350f; font-size: .94em; }
.your-status .sub { font-size: .82em; color: #92400e; margin-top: 2px; }
</style>
</head>

      <ul class="rules-list" id="rulesList"></ul>
    </div>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

function escHtml(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtPhone(e164){
  if (!e164) return '';
  const d = String(e164).replace(/\D/g,'');
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return e164;
}

function renderStores() {
  const list = document.getElementById('storesList');

  // Tagline + hours banner — premium dark green with subtle glow accents
  const banner = `
    <div class="stores-tagline">
      <div class="ti">${escHtml(tx('tagline'))}</div>
      <div class="meta">⏰ ${escHtml(tx('hours'))}</div>
    </div>
  `;

  // Each store as a self-contained card (no nested anchors — actions are
  // independent links, card itself is presentational)
  const cards = BRANCHES.map(b => {
    const mapHref = `https://maps.google.com/?q=${encodeURIComponent('KIMCHI MART ' + b.address)}`;
    const callHref = b.phone ? `tel:${b.phone}` : null;
    let badge = '';
    if (b.comingSoon)      badge = `<span class="store-badge coming">${escHtml(tx('comingSoon'))}</span>`;
    else if (b.justOpened) badge = `<span class="store-badge new">${escHtml(tx('newOpen'))}</span>`;
    const klass = b.comingSoon ? 'store-card coming' : 'store-card';

    let actions = '';
    if (!b.comingSoon) {
      actions = `
        <div class="store-actions">
          <a class="store-btn primary" href="${mapHref}" target="_blank" rel="noopener">
            <span>${escHtml(tx('storeMap'))}</span>
            <span class="arrow">→</span>
          </a>
          ${callHref ? `
            <a class="store-btn ghost" href="${callHref}">
              <span>📞</span>
              <span>${escHtml(fmtPhone(b.phone))}</span>
            </a>
          ` : ''}
        </div>
      `;
    }

    return `
      <div class="${klass}">
        <div class="store-pin">📍</div>
        <div class="store-content">
          <div class="store-head">
            <span class="store-name">${escHtml(b.name)}</span>
            ${badge}
          </div>
          <div class="store-addr">${escHtml(b.address)}</div>
          ${actions}
        </div>
      </div>
    `;
  }).join('');

  list.innerHTML = banner + cards;
}

// Show "you are already a member" status if applicable
async function loadStatus() {
  try {
    const c = await KMR.fetchCustomer(me.phone);
    if (!c) return;
    const mem = KMR.getActiveMembership(c);
    if (!mem) return;
    const planName = mem.plan === 'k2' ? T('membK2Name') : T('membK1Name');
    const perk = mem.plan === 'k2' ? T('membDiscount10') : T('membDiscount5');
    const isTrial = mem.grantType === 'auto-trial';
    const days = KMR.daysUntilMembershipExpiry(c);
    const sub = isTrial && days != null
      ? `${T('membTrial')} · ${days} days left`
      : T('membActive');
    document.getElementById('yourStatus').style.display = '';
    document.getElementById('yourStatus').innerHTML = `
      <div class="your-status">
        <div class="ic">${mem.plan==='k2'?'💎':'⭐'}</div>
        <div style="flex:1">
          <div class="ti">${escHtml(planName)} — ${escHtml(perk)}</div>
          <div class="sub">${escHtml(sub)}</div>
        </div>
      </div>`;
  } catch(e) {}
}
loadStatus();
