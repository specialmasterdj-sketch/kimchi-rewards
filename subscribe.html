<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a5c3a">
<title>Subscribe · KIMCHI MART REWARDS</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./pwa-assets/icon-192.png" type="image/png">
<link rel="stylesheet" href="./style.css">
<style>
.sub-hero {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  margin-bottom: 14px;
  background-image: url('./pwa-assets/store/k-sides.jpg');
  background-size: cover;
  background-position: center;
  aspect-ratio: 16 / 8;
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
}
.sub-hero::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,.65) 100%);
}
.sub-hero .content {
  position: absolute; left: 22px; right: 22px; bottom: 18px;
  color: #fff;
  z-index: 2;
  text-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.sub-hero .ti { font-weight: 900; font-size: 1.3em; letter-spacing: -.02em; }
.sub-hero .sub { font-size: .9em; opacity: .92; margin-top: 4px; line-height: 1.4; }

.plan-grid { display: grid; gap: 10px; }
.sub-plan {
  position: relative;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  overflow: hidden;
  transition: all .25s cubic-bezier(.2,.8,.2,1);
}
.sub-plan::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.sub-plan.weekly::before { background: linear-gradient(90deg, #22c55e, #16a34a); }
.sub-plan.biweekly::before { background: linear-gradient(90deg, #3b82f6, #1e40af); }
.sub-plan.monthly::before { background: linear-gradient(90deg, #a855f7, #6d28d9); }
.sub-plan.premium::before { background: linear-gradient(90deg, #f59e0b, #b45309); }
.sub-plan:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(0,0,0,.08);
  border-color: transparent;
}
.sub-plan.featured {
  border-color: var(--km-green);
  box-shadow: 0 8px 24px rgba(26,92,58,.12);
}
.sub-plan .featured-tag {
  position: absolute;
  top: 14px; right: 14px;
  background: linear-gradient(135deg, var(--km-green), var(--km-green-d));
  color: #fff;
  font-size: .68em; font-weight: 900;
  padding: 4px 10px;
  border-radius: 99px;
  letter-spacing: .1em;
  box-shadow: 0 2px 6px rgba(26,92,58,.3);
}

.sub-plan .head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.sub-plan .ic-circle {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5em;
  flex-shrink: 0;
}
.sub-plan.weekly .ic-circle { background: linear-gradient(135deg, #dcfce7, #86efac); }
.sub-plan.biweekly .ic-circle { background: linear-gradient(135deg, #dbeafe, #93c5fd); }
.sub-plan.monthly .ic-circle { background: linear-gradient(135deg, #f3e8ff, #c4b5fd); }
.sub-plan.premium .ic-circle { background: linear-gradient(135deg, #fef3c7, #fcd34d); }

.sub-plan .titles .nm { font-weight: 900; font-size: 1.1em; letter-spacing: -.01em; }
.sub-plan .titles .freq { font-size: .82em; color: var(--text-3); margin-top: 1px; }

.sub-plan .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.sub-plan .price { font-weight: 900; font-size: 1.7em; letter-spacing: -.02em; color: var(--km-green-d); }
.sub-plan .per { font-size: .82em; color: var(--text-3); }
.sub-plan.premium .price { color: #b45309; }

.sub-plan .perks { list-style: none; padding: 0; margin: 0; }
.sub-plan .perks li {
  font-size: .88em;
  padding: 7px 0;
  display: flex; align-items: flex-start; gap: 10px;
  color: var(--text-2);
  line-height: 1.4;
}
.sub-plan .perks li::before {
  content: '✓';
  color: var(--km-green);
  font-weight: 900;
  flex-shrink: 0;
  margin-top: 1px;
}

.cta-strip {
  background: linear-gradient(135deg, var(--km-green) 0%, var(--km-green-d) 100%);
  color: #fff;
  border-radius: 14px;
  padding: 18px 20px;
  text-align: center;
  margin-top: 14px;
}
.cta-strip .ti { font-weight: 800; font-size: 1.02em; letter-spacing: -.01em; }
.cta-strip .sub { font-size: .85em; opacity: .9; margin-top: 4px; }

.faq-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 8px;
}
.faq-item summary {
  font-weight: 700; font-size: .94em;
  cursor: pointer;
  color: var(--text);
  list-style: none;
  display: flex; justify-content: space-between; align-items: center;
}
.faq-item summary::-webkit-details-marker { display: none; }
.faq-item summary::after { content: '+'; color: var(--km-green); font-weight: 900; font-size: 1.2em; }
.faq-item[open] summary::after { content: '−'; }
.faq-item .ans {
  font-size: .85em; color: var(--text-2);
  margin-top: 8px;
  line-height: 1.55;
}

.coming-banner {
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1px solid #fcd34d;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: .88em;
  color: #78350f;
  margin-bottom: 14px;
  display: flex;
  align-items: center; gap: 10px;
}
.coming-banner .ic { font-size: 1.4em; }
.coming-banner b { color: #5d3409; }
</style>
</head>
<body>

    <div class="cta-strip">

      <div class="sub" id="ctaSub"></div>
    </div>

    <!-- FAQ -->
    <div class="sec-title" id="lblFaq"></div>
    <details class="faq-item">
      <summary id="q1"></summary>
      <div class="ans" id="a1"></div>
    </details>
    <details class="faq-item">
      <summary id="q2"></summary>
      <div class="ans" id="a2"></div>
    </details>
    <details class="faq-item">
      <summary id="q3"></summary>
      <div class="ans" id="a3"></div>
    </details>
    <details class="faq-item">
      <summary id="q4"></summary>
      <div class="ans" id="a4"></div>
    </details>
  </main>

  <nav class="tabbar" id="tabbar"></nav>
</div>

<script src="./app.js"></script>

function applyTexts() {
